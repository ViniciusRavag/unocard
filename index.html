<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nossa História · Galeria do Casamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

  // ══════════════════════════════════════════
  //  🔥 CONFIGURE SEU FIREBASE AQUI
  // ══════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJECT.firebaseapp.com",
    projectId: "SEU_PROJECT_ID",
    storageBucket: "SEU_PROJECT.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };
  // ══════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  window.__firebase = { db, storage, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, onSnapshot, query, orderBy, serverTimestamp, ref, uploadBytes, getDownloadURL };
</script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf7f2;
    --warm: #f5ede0;
    --rose: #c8836a;
    --rose-dark: #a96650;
    --rose-light: #e8b4a0;
    --gold: #c9a96e;
    --gold-light: #e8d5a8;
    --charcoal: #2c2520;
    --muted: #8a7a70;
    --glass: rgba(250,247,242,0.85);
    --shadow: 0 8px 40px rgba(44,37,32,0.12);
    --shadow-lg: 0 20px 80px rgba(44,37,32,0.2);
    --r: 16px;
    --r-lg: 24px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--cream); }
  body { font-family: 'DM Sans', sans-serif; color: var(--charcoal); }

  #root { height: 100vh; display: flex; flex-direction: column; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rose-light); border-radius: 4px; }

  /* ── ORNAMENT ── */
  .ornament { color: var(--gold); opacity: 0.6; font-size: 1.1em; }

  /* ── SPLASH ── */
  .splash {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--cream);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    animation: splashOut 0.6s ease 2.8s forwards;
  }
  .splash-flower {
    font-size: 3rem;
    animation: spinIn 1.2s cubic-bezier(.17,.67,.38,1.3) forwards;
    opacity: 0;
  }
  .splash h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 300;
    color: var(--charcoal);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }
  .splash p {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
  }
  .splash-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    animation: fadeUp 0.8s ease 1.2s forwards;
  }
  @keyframes spinIn { from { opacity:0; transform:rotate(-180deg) scale(0.3); } to { opacity:1; transform:rotate(0deg) scale(1); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes splashOut { to { opacity:0; pointer-events:none; transform:scale(1.04); } }

  /* ── HEADER ── */
  .header {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,169,110,0.2);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 100;
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--charcoal);
  }
  .header-title span { color: var(--rose); font-style: italic; }
  .header-sub {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-date {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
  }

  /* ── NAV ── */
  .nav {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,169,110,0.15);
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 8px 16px;
    flex-shrink: 0;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 8px 20px; border-radius: 50px;
    border: none; background: transparent; cursor: pointer;
    transition: all 0.25s ease; color: var(--muted); font-family: inherit;
    position: relative;
  }
  .nav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; transition: all 0.25s; }
  .nav-btn span { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .nav-btn.active { color: var(--rose); background: rgba(200,131,106,0.1); }
  .nav-btn.active svg { stroke-width: 2.2; }
  .nav-upload {
    background: linear-gradient(135deg, var(--rose), var(--rose-dark)) !important;
    color: white !important; padding: 12px 28px; box-shadow: 0 4px 20px rgba(200,131,106,0.4);
    transform: translateY(-2px);
  }
  .nav-upload:active { transform: translateY(0) scale(0.97); }

  /* ── CONTENT ── */
  .content { flex: 1; overflow: hidden; position: relative; }

  /* ── WELCOME NAME MODAL ── */
  .name-modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(44,37,32,0.5);
    backdrop-filter: blur(10px);
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  .name-modal {
    background: var(--cream);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    padding: 32px 28px 40px;
    width: 100%; max-width: 480px;
    text-align: center;
    animation: slideUp 0.4s cubic-bezier(.17,.67,.38,1.1);
  }
  .name-modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 400;
    margin: 12px 0 6px; color: var(--charcoal);
  }
  .name-modal p { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .input-field {
    width: 100%; padding: 14px 18px;
    border: 1.5px solid rgba(201,169,110,0.4);
    border-radius: var(--r); background: white;
    font-family: inherit; font-size: 1rem; color: var(--charcoal);
    outline: none; transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .input-field:focus { border-color: var(--rose); }
  .btn-primary {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: white; border: none; border-radius: var(--r);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(200,131,106,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(200,131,106,0.45); }
  .btn-primary:active { transform: translateY(1px); }

  /* ── GALLERY GRID ── */
  .gallery-view {
    height: 100%; overflow-y: auto; padding: 16px;
    scroll-behavior: smooth;
  }
  .gallery-header-block {
    text-align: center; padding: 8px 0 20px;
  }
  .gallery-header-block h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 300;
    color: var(--charcoal);
  }
  .gallery-header-block p { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .masonry-grid {
    columns: 2; column-gap: 10px;
  }
  @media (min-width: 600px) { .masonry-grid { columns: 3; } }
  .masonry-item {
    break-inside: avoid; margin-bottom: 10px;
    border-radius: var(--r); overflow: hidden;
    position: relative; cursor: pointer;
    animation: fadeIn 0.5s ease;
    box-shadow: 0 4px 16px rgba(44,37,32,0.1);
  }
  .masonry-item img {
    width: 100%; display: block;
    transition: transform 0.4s ease;
  }
  .masonry-item:hover img { transform: scale(1.04); }
  .masonry-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(44,37,32,0.55) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: flex-end; padding: 10px;
  }
  .masonry-item:hover .masonry-overlay { opacity: 1; }
  .masonry-overlay-info { display: flex; align-items: center; gap: 6px; color: white; }
  .masonry-overlay-info span { font-size: 0.72rem; }
  .masonry-heart { font-size: 0.9rem; }
  .photo-count-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--warm); border-radius: 50px;
    padding: 6px 14px; font-size: 0.75rem; color: var(--muted);
    margin-bottom: 16px;
  }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big-emoji { font-size: 3.5rem; display: block; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 400; color: var(--charcoal);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* ── FEED / REELS ── */
  .feed-view {
    height: 100%; overflow: hidden; position: relative;
    background: #1a1410;
  }
  .feed-scroll {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .feed-scroll::-webkit-scrollbar { display: none; }
  .feed-item {
    height: 100%;
    scroll-snap-align: start;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    background: #1a1410;
    flex-shrink: 0;
  }
  .feed-img {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 0.6s ease;
  }
  .feed-item.active .feed-img { transform: scale(1.03); }
  .feed-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(20,14,10,0.2) 60%,
      rgba(20,14,10,0.85) 100%
    );
  }
  .feed-actions {
    position: absolute; right: 16px; bottom: 100px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    z-index: 10;
  }
  .feed-action-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none;
    color: white; font-family: inherit;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    transition: transform 0.2s ease;
  }
  .feed-action-btn:active { transform: scale(0.88); }
  .feed-action-btn svg { width: 30px; height: 30px; stroke-width: 1.6; }
  .feed-action-btn .action-count { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.04em; }
  .feed-action-btn.liked svg { fill: #ff4d6d; stroke: #ff4d6d; }
  .heart-burst {
    animation: heartBurst 0.5s cubic-bezier(.17,.67,.38,1.3) forwards;
  }
  @keyframes heartBurst {
    0% { transform: scale(1); }
    50% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }
  .feed-info {
    position: absolute; left: 16px; right: 80px; bottom: 40px; z-index: 10;
    color: white;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
  .feed-author {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .feed-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 600; color: white;
    border: 2px solid rgba(255,255,255,0.5);
    flex-shrink: 0;
  }
  .feed-author-name { font-size: 0.9rem; font-weight: 500; }
  .feed-caption {
    font-size: 0.82rem; line-height: 1.4; opacity: 0.9;
    margin-bottom: 8px; max-width: 260px;
  }
  .feed-time { font-size: 0.7rem; opacity: 0.6; }
  .feed-indicator {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 4px;
    z-index: 10;
  }
  .feed-dot {
    width: 3px; border-radius: 3px;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease;
  }
  .feed-dot.active { background: white; height: 20px; }
  .feed-dot:not(.active) { height: 6px; }
  .feed-empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6); gap: 16px;
    text-align: center; padding: 40px;
  }
  .feed-empty h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 300; color: rgba(255,255,255,0.8);
  }

  /* ── COMMENTS SHEET ── */
  .comments-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(20,14,10,0.6);
    backdrop-filter: blur(6px);
    animation: fadeIn 0.25s ease;
  }
  .comments-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #faf7f2;
    border-radius: 24px 24px 0 0;
    max-height: 75vh; display: flex; flex-direction: column;
    animation: slideUp 0.35s cubic-bezier(.17,.67,.38,1.1);
  }
  .comments-handle {
    width: 36px; height: 4px; border-radius: 4px;
    background: rgba(44,37,32,0.2); margin: 12px auto 16px;
    flex-shrink: 0;
  }
  .comments-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 400;
    text-align: center; color: var(--charcoal);
    padding: 0 20px 12px;
    border-bottom: 1px solid rgba(201,169,110,0.2);
    flex-shrink: 0;
  }
  .comments-list {
    flex: 1; overflow-y: auto; padding: 12px 20px;
  }
  .comment-item {
    display: flex; gap: 10px; margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  .comment-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-light), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 600; color: var(--charcoal);
    flex-shrink: 0;
  }
  .comment-body { flex: 1; }
  .comment-name { font-size: 0.78rem; font-weight: 500; color: var(--charcoal); margin-bottom: 2px; }
  .comment-text { font-size: 0.83rem; color: var(--muted); line-height: 1.4; }
  .comment-time { font-size: 0.68rem; color: var(--rose-light); margin-top: 3px; }
  .comments-input-row {
    display: flex; gap: 10px; padding: 12px 20px 28px;
    border-top: 1px solid rgba(201,169,110,0.15);
    flex-shrink: 0;
    background: var(--cream);
  }
  .comment-input {
    flex: 1; padding: 10px 16px;
    border: 1.5px solid rgba(201,169,110,0.3);
    border-radius: 50px; background: white;
    font-family: inherit; font-size: 0.88rem; color: var(--charcoal);
    outline: none; transition: border-color 0.2s;
  }
  .comment-input:focus { border-color: var(--rose); }
  .comment-send {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--rose); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; transition: all 0.2s; flex-shrink: 0;
  }
  .comment-send:hover { background: var(--rose-dark); transform: scale(1.05); }

  /* ── UPLOAD VIEW ── */
  .upload-view {
    height: 100%; overflow-y: auto; padding: 24px 20px 40px;
  }
  .upload-header {
    text-align: center; margin-bottom: 28px;
  }
  .upload-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300; color: var(--charcoal);
    margin-bottom: 4px;
  }
  .upload-header p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
  .upload-zone {
    border: 2px dashed rgba(201,169,110,0.4);
    border-radius: var(--r-lg); padding: 40px 20px;
    text-align: center; cursor: pointer;
    transition: all 0.3s ease; background: var(--warm);
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--rose);
    background: rgba(200,131,106,0.08);
    transform: scale(1.01);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .upload-zone h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 400; color: var(--charcoal); margin-bottom: 4px;
  }
  .upload-zone p { font-size: 0.78rem; color: var(--muted); }
  .upload-previews {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .upload-preview-item {
    aspect-ratio: 1; border-radius: var(--r); overflow: hidden; position: relative;
    animation: fadeIn 0.3s ease;
  }
  .upload-preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .remove-preview {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(44,37,32,0.7); color: white; border: none;
    cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
  }
  .caption-field {
    width: 100%; padding: 14px 18px;
    border: 1.5px solid rgba(201,169,110,0.3);
    border-radius: var(--r); background: white;
    font-family: inherit; font-size: 0.9rem; color: var(--charcoal);
    outline: none; resize: none; height: 80px;
    transition: border-color 0.2s; margin-bottom: 16px;
  }
  .caption-field:focus { border-color: var(--rose); }
  .upload-progress {
    width: 100%; height: 6px; border-radius: 3px;
    background: var(--warm); overflow: hidden; margin-bottom: 16px;
  }
  .upload-progress-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--rose-light), var(--rose));
    transition: width 0.3s ease;
  }
  .upload-tip {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(201,169,110,0.1);
    border-radius: var(--r); padding: 14px;
    margin-bottom: 20px;
  }
  .upload-tip span { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .upload-tip p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 600;
    background: rgba(20,14,10,0.95);
    display: flex; flex-direction: column;
    animation: fadeIn 0.25s ease;
  }
  .lightbox-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .lightbox-author { display: flex; align-items: center; gap: 10px; color: white; }
  .lightbox-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 600; color: white;
  }
  .lightbox-author-info .name { font-size: 0.85rem; font-weight: 500; }
  .lightbox-author-info .time { font-size: 0.72rem; opacity: 0.6; }
  .lightbox-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: background 0.2s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .lightbox-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .lightbox-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox-footer { padding: 16px 20px 32px; flex-shrink: 0; }
  .lightbox-actions {
    display: flex; align-items: center; gap: 20px; margin-bottom: 12px;
  }
  .lb-action-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: white; cursor: pointer;
    font-family: inherit; font-size: 0.85rem;
    transition: transform 0.2s;
  }
  .lb-action-btn:active { transform: scale(0.9); }
  .lb-action-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .lb-action-btn.liked svg { fill: #ff4d6d; stroke: #ff4d6d; }
  .lightbox-caption { color: rgba(255,255,255,0.7); font-size: 0.82rem; line-height: 1.5; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    z-index: 800; padding: 10px 20px;
    background: var(--charcoal); color: white;
    border-radius: 50px; font-size: 0.82rem;
    box-shadow: var(--shadow); white-space: nowrap;
    animation: toastAnim 2.5s ease forwards;
    pointer-events: none;
  }
  @keyframes toastAnim {
    0% { opacity:0; transform:translateX(-50%) translateY(-8px); }
    15% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; }
    100% { opacity:0; transform:translateX(-50%) translateY(-8px); }
  }

  /* ── UTILS ── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(80px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  .loader {
    display: flex; align-items: center; justify-content: center;
    height: 100px; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--warm);
    border-top-color: var(--rose); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .double-tap-heart {
    position: absolute; font-size: 5rem; pointer-events: none;
    animation: dtHeart 0.9s ease forwards; z-index: 20;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  @keyframes dtHeart {
    0% { opacity:0; transform:translate(-50%,-50%) scale(0.3); }
    40% { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
    70% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
  }

  .tag-pill {
    display: inline-block; padding: 3px 10px;
    background: rgba(200,131,106,0.12);
    border-radius: 50px; font-size: 0.7rem; color: var(--rose);
    margin-right: 6px; margin-bottom: 6px;
  }

  .section-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0;
  }
  .section-divider hr { flex:1; border: none; border-top: 1px solid rgba(201,169,110,0.25); }
  .section-divider span { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }

  .floating-btn {
    position: fixed; bottom: 90px; right: 20px; z-index: 200;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: white; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(200,131,106,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; font-size: 1.4rem;
  }
  .floating-btn:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 8px 30px rgba(200,131,106,0.6); }

  /* ── PHOTO COUNT RING ── */
  .count-ring {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 50%;
    background: conic-gradient(var(--rose) 0% var(--pct, 0%), var(--warm) var(--pct, 0%) 100%);
    font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    color: var(--charcoal); font-weight: 600;
    position: relative;
  }
  .count-ring::after {
    content: ''; position: absolute; inset: 5px;
    border-radius: 50%; background: var(--cream);
  }
  .count-ring span { position: relative; z-index: 1; font-size: 0.85rem; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── HELPERS ──────────────────────────────
const initials = name => name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '?';
const relTime = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)}min`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
};

// ── ICONS ────────────────────────────────
const Icon = ({ name, ...p }) => {
  const icons = {
    grid: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    play: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><polygon points="5,3 19,12 5,21"/></svg>,
    camera: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
    heart: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
    comment: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
    send: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>,
    download: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    share: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    image: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>,
    sparkle: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...p}><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>,
  };
  return icons[name] || null;
};

// ── TOAST ────────────────────────────────
const Toast = ({ msg, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 2600); return () => clearTimeout(t); }, []);
  return <div className="toast">✨ {msg}</div>;
};

// ── NAME MODAL ───────────────────────────
const NameModal = ({ onDone }) => {
  const [name, setName] = useState('');
  const submit = () => { if (name.trim()) onDone(name.trim()); };
  return (
    <div className="name-modal-overlay">
      <div className="name-modal">
        <div style={{fontSize:'2.5rem'}}>💍</div>
        <h2>Bem-vindo ao nosso dia!</h2>
        <p>Como você gostaria de ser identificado na galeria? Seus momentos ficam para sempre aqui ✨</p>
        <input className="input-field" placeholder="Seu nome completo" value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && submit()} autoFocus />
        <button className="btn-primary" onClick={submit} disabled={!name.trim()}>
          Entrar na celebração
        </button>
      </div>
    </div>
  );
};

// ── GALLERY VIEW ─────────────────────────
const GalleryView = ({ photos, onPhotoClick, loading }) => {
  return (
    <div className="gallery-view">
      <div className="gallery-header-block">
        <div style={{fontSize:'1.6rem', marginBottom:'8px'}}>🌸</div>
        <h2>Momentos Eternos</h2>
        <p style={{marginBottom:'12px'}}>Cada foto conta um pedaço desta história</p>
        {photos.length > 0 && (
          <div className="photo-count-badge">
            <span>🌹</span>
            <span>{photos.length} {photos.length === 1 ? 'memória' : 'memórias'} compartilhadas</span>
          </div>
        )}
      </div>
      {loading ? (
        <div className="loader"><div className="spinner"/></div>
      ) : photos.length === 0 ? (
        <div className="empty-state">
          <span className="big-emoji">📷</span>
          <h3>Seja o primeiro!</h3>
          <p>Compartilhe suas fotos do casamento e faça parte desta galeria de amor. Toque em "Câmera" para começar!</p>
        </div>
      ) : (
        <div className="masonry-grid">
          {photos.map((p, i) => (
            <div key={p.id} className="masonry-item" onClick={() => onPhotoClick(p, i)}>
              <img src={p.url} alt="" loading="lazy" />
              <div className="masonry-overlay">
                <div className="masonry-overlay-info">
                  <span className="masonry-heart">❤️</span>
                  <span>{(p.likes||[]).length}</span>
                  <span style={{marginLeft:'8px'}}>💬</span>
                  <span>{(p.comments||[]).length}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{height:'20px'}}/>
    </div>
  );
};

// ── FEED VIEW ────────────────────────────
const FeedView = ({ photos, guestName, onUpdate }) => {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [showComments, setShowComments] = useState(null);
  const [dtHeart, setDtHeart] = useState(false);
  const [lastTap, setLastTap] = useState(0);
  const scrollRef = useRef();

  const handleScroll = useCallback(() => {
    if (!scrollRef.current) return;
    const { scrollTop, clientHeight } = scrollRef.current;
    const idx = Math.round(scrollTop / clientHeight);
    setCurrentIdx(idx);
  }, []);

  const toggleLike = async (photo) => {
    const fb = window.__firebase;
    if (!fb) return;
    const { db, doc, updateDoc, arrayUnion } = fb;
    const likes = photo.likes || [];
    const liked = likes.includes(guestName);
    const newLikes = liked ? likes.filter(n => n !== guestName) : [...likes, guestName];
    onUpdate(photo.id, { likes: newLikes });
    try {
      await updateDoc(doc(db, 'photos', photo.id), { likes: newLikes });
    } catch(e) {}
  };

  const handleDoubleTap = (photo) => {
    const now = Date.now();
    if (now - lastTap < 320) {
      if (!(photo.likes||[]).includes(guestName)) toggleLike(photo);
      setDtHeart(true);
      setTimeout(() => setDtHeart(false), 900);
    }
    setLastTap(now);
  };

  const addComment = async (photo, text) => {
    if (!text.trim()) return;
    const fb = window.__firebase;
    if (!fb) return;
    const { db, doc, updateDoc } = fb;
    const comment = { author: guestName, text: text.trim(), time: new Date().toISOString() };
    const newComments = [...(photo.comments||[]), comment];
    onUpdate(photo.id, { comments: newComments });
    try {
      await updateDoc(doc(db, 'photos', photo.id), { comments: newComments });
    } catch(e) {}
  };

  if (photos.length === 0) return (
    <div className="feed-view">
      <div className="feed-empty">
        <div style={{fontSize:'3rem'}}>🎞️</div>
        <h3>Nenhuma foto ainda</h3>
        <p style={{fontSize:'0.82rem', opacity:0.7}}>Seja o primeiro a compartilhar um momento especial!</p>
      </div>
    </div>
  );

  const currPhoto = photos[currentIdx] || photos[0];

  return (
    <div className="feed-view">
      <div className="feed-scroll" ref={scrollRef} onScroll={handleScroll}>
        {photos.map((photo, i) => {
          const liked = (photo.likes||[]).includes(guestName);
          return (
            <div key={photo.id} className={`feed-item ${i === currentIdx ? 'active' : ''}`}
              onClick={() => handleDoubleTap(photo)}>
              <div className="feed-img" style={{backgroundImage:`url(${photo.url})`}}/>
              <div className="feed-gradient"/>
              {i === currentIdx && dtHeart && <div className="double-tap-heart">❤️</div>}
              <div className="feed-actions" onClick={e => e.stopPropagation()}>
                <button className={`feed-action-btn ${liked ? 'liked' : ''}`} onClick={() => toggleLike(photo)}>
                  <Icon name="heart" width="28" height="28"/>
                  <span className="action-count">{(photo.likes||[]).length}</span>
                </button>
                <button className="feed-action-btn" onClick={() => setShowComments(photo)}>
                  <Icon name="comment" width="28" height="28"/>
                  <span className="action-count">{(photo.comments||[]).length}</span>
                </button>
                <button className="feed-action-btn" onClick={() => { const a=document.createElement('a');a.href=photo.url;a.download='casamento.jpg';a.click(); }}>
                  <Icon name="download" width="28" height="28"/>
                  <span className="action-count">salvar</span>
                </button>
              </div>
              <div className="feed-info">
                <div className="feed-author">
                  <div className="feed-avatar">{initials(photo.author)}</div>
                  <span className="feed-author-name">{photo.author}</span>
                </div>
                {photo.caption && <p className="feed-caption">{photo.caption}</p>}
                <p className="feed-time">{relTime(photo.createdAt)}</p>
              </div>
            </div>
          );
        })}
      </div>
      {photos.length > 1 && (
        <div className="feed-indicator">
          {photos.slice(0, Math.min(photos.length, 8)).map((_, i) => (
            <div key={i} className={`feed-dot ${i === currentIdx ? 'active' : ''}`}/>
          ))}
        </div>
      )}
      {showComments && (
        <CommentsSheet
          photo={showComments}
          guestName={guestName}
          onClose={() => setShowComments(null)}
          onAddComment={addComment}
        />
      )}
    </div>
  );
};

// ── COMMENTS SHEET ───────────────────────
const CommentsSheet = ({ photo, guestName, onClose, onAddComment }) => {
  const [text, setText] = useState('');
  const listRef = useRef();

  const send = () => {
    if (!text.trim()) return;
    onAddComment(photo, text);
    setText('');
    setTimeout(() => { if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight; }, 100);
  };

  return (
    <div className="comments-overlay" onClick={onClose}>
      <div className="comments-sheet" onClick={e => e.stopPropagation()}>
        <div className="comments-handle"/>
        <div className="comments-title">💬 Comentários</div>
        <div className="comments-list" ref={listRef}>
          {(photo.comments||[]).length === 0 ? (
            <div style={{textAlign:'center', padding:'30px', color:'var(--muted)', fontSize:'0.85rem'}}>
              <div style={{fontSize:'1.8rem', marginBottom:'8px'}}>🌸</div>
              Seja o primeiro a comentar!
            </div>
          ) : (
            (photo.comments||[]).map((c, i) => (
              <div key={i} className="comment-item">
                <div className="comment-avatar">{initials(c.author)}</div>
                <div className="comment-body">
                  <div className="comment-name">{c.author}</div>
                  <div className="comment-text">{c.text}</div>
                  <div className="comment-time">{relTime(c.time)}</div>
                </div>
              </div>
            ))
          )}
        </div>
        <div className="comments-input-row">
          <div className="comment-avatar" style={{flexShrink:0}}>{initials(guestName)}</div>
          <input className="comment-input" placeholder="Deixe uma mensagem carinhosa…"
            value={text} onChange={e => setText(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && send()} />
          <button className="comment-send" onClick={send}>
            <Icon name="send" width="16" height="16"/>
          </button>
        </div>
      </div>
    </div>
  );
};

// ── LIGHTBOX ─────────────────────────────
const Lightbox = ({ photo, guestName, onClose, onUpdate }) => {
  const [showComments, setShowComments] = useState(false);
  const liked = (photo.likes||[]).includes(guestName);

  const toggleLike = async () => {
    const fb = window.__firebase;
    if (!fb) return;
    const { db, doc, updateDoc } = fb;
    const likes = photo.likes || [];
    const newLikes = liked ? likes.filter(n => n !== guestName) : [...likes, guestName];
    onUpdate(photo.id, { likes: newLikes });
    try { await updateDoc(doc(db, 'photos', photo.id), { likes: newLikes }); } catch(e) {}
  };

  const addComment = async (p, text) => {
    const fb = window.__firebase;
    if (!fb || !text.trim()) return;
    const { db, doc, updateDoc } = fb;
    const comment = { author: guestName, text: text.trim(), time: new Date().toISOString() };
    const newComments = [...(p.comments||[]), comment];
    onUpdate(photo.id, { comments: newComments });
    try { await updateDoc(doc(db, 'photos', photo.id), { comments: newComments }); } catch(e) {}
  };

  return (
    <div className="lightbox">
      <div className="lightbox-header">
        <div className="lightbox-author">
          <div className="lightbox-avatar">{initials(photo.author)}</div>
          <div className="lightbox-author-info">
            <div className="name">{photo.author}</div>
            <div className="time">{relTime(photo.createdAt)}</div>
          </div>
        </div>
        <button className="lightbox-close" onClick={onClose}><Icon name="x" width="16" height="16"/></button>
      </div>
      <div className="lightbox-img-wrap">
        <img className="lightbox-img" src={photo.url} alt=""/>
      </div>
      <div className="lightbox-footer">
        <div className="lightbox-actions">
          <button className={`lb-action-btn ${liked ? 'liked' : ''}`} onClick={toggleLike}>
            <Icon name="heart" width="22" height="22"/>
            <span>{(photo.likes||[]).length} curtidas</span>
          </button>
          <button className="lb-action-btn" onClick={() => setShowComments(true)}>
            <Icon name="comment" width="22" height="22"/>
            <span>{(photo.comments||[]).length} comentários</span>
          </button>
          <button className="lb-action-btn" onClick={() => { const a=document.createElement('a');a.href=photo.url;a.download='casamento.jpg';a.click(); }}>
            <Icon name="download" width="22" height="22"/>
          </button>
        </div>
        {photo.caption && <p className="lightbox-caption">{photo.caption}</p>}
      </div>
      {showComments && (
        <CommentsSheet photo={photo} guestName={guestName}
          onClose={() => setShowComments(false)} onAddComment={addComment}/>
      )}
    </div>
  );
};

// ── UPLOAD VIEW ──────────────────────────
const UploadView = ({ guestName, onUploaded, onToast }) => {
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const [caption, setCaption] = useState('');
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [drag, setDrag] = useState(false);
  const inputRef = useRef();

  const handleFiles = (fileList) => {
    const arr = Array.from(fileList).filter(f => f.type.startsWith('image/')).slice(0, 9);
    setFiles(arr);
    const ps = arr.map(f => URL.createObjectURL(f));
    setPreviews(ps);
  };

  const removeFile = (i) => {
    setFiles(f => f.filter((_,j) => j!==i));
    setPreviews(p => p.filter((_,j) => j!==i));
  };

  const upload = async () => {
    if (!files.length) return;
    const fb = window.__firebase;
    if (!fb) { onToast('Configure o Firebase primeiro!'); return; }
    const { db, storage, collection, addDoc, ref, uploadBytes, getDownloadURL, serverTimestamp } = fb;
    setUploading(true);
    setProgress(0);
    try {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const storageRef = ref(storage, `photos/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await addDoc(collection(db, 'photos'), {
          url, author: guestName, caption,
          likes: [], comments: [],
          createdAt: serverTimestamp()
        });
        setProgress(Math.round(((i+1)/files.length)*100));
      }
      onToast(`${files.length} foto${files.length>1?'s':''} enviada${files.length>1?'s':''}!`);
      setFiles([]); setPreviews([]); setCaption('');
      onUploaded();
    } catch(e) {
      console.error(e);
      onToast('Erro ao enviar. Verifique o Firebase.');
    } finally { setUploading(false); setProgress(0); }
  };

  return (
    <div className="upload-view">
      <div className="upload-header">
        <div style={{fontSize:'2rem', marginBottom:'8px'}}>📸</div>
        <h2>Compartilhe seu momento</h2>
        <p>Registre sua perspectiva deste dia especial e eternize na galeria dos noivos</p>
      </div>

      <div className="upload-zone" className={`upload-zone ${drag ? 'drag-over' : ''}`}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}>
        <input ref={inputRef} type="file" accept="image/*" multiple capture="environment"
          onChange={e => handleFiles(e.target.files)} />
        <span className="upload-icon">🌹</span>
        <h3>{files.length ? `${files.length} foto${files.length>1?'s':''} selecionada${files.length>1?'s':''}` : 'Toque para fotografar'}</h3>
        <p>{files.length ? 'Toque para trocar' : 'ou escolha da galeria · até 9 fotos'}</p>
      </div>

      {previews.length > 0 && (
        <>
          <div className="upload-previews">
            {previews.map((src, i) => (
              <div key={i} className="upload-preview-item">
                <img src={src} alt=""/>
                <button className="remove-preview" onClick={() => removeFile(i)}>✕</button>
              </div>
            ))}
          </div>
          <textarea className="caption-field input-field"
            style={{height:'80px', resize:'none', marginBottom:'16px'}}
            placeholder="Adicione uma mensagem carinhosa (opcional)…"
            value={caption} onChange={e => setCaption(e.target.value)} maxLength={200}/>
          {uploading && (
            <div className="upload-progress">
              <div className="upload-progress-bar" style={{width:`${progress}%`}}/>
            </div>
          )}
          <button className="btn-primary" onClick={upload} disabled={uploading}>
            {uploading ? `Enviando… ${progress}%` : `✨ Publicar na galeria`}
          </button>
          <div style={{height:'12px'}}/>
        </>
      )}

      <div className="upload-tip">
        <span>💌</span>
        <p>Suas fotos vão direto para a galeria dos noivos. Eles poderão ver cada momento capturado pelos convidados com muito carinho.</p>
      </div>
      <div className="section-divider">
        <hr/><span>dica de foto</span><hr/>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:'10px', paddingBottom:'20px'}}>
        {['Capture os detalhes: flores, mesa, laços 🌸', 'Fotografe as expressões dos noivos ✨', 'Momentos espontâneos são os mais especiais 💛', 'Registre o ambiente e a decoração 🏰'].map(tip => (
          <div key={tip} style={{display:'flex', alignItems:'center', gap:'10px', fontSize:'0.8rem', color:'var(--muted)'}}>
            <span style={{fontSize:'0.6rem', color:'var(--rose)'}}>◆</span>{tip}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── MAIN APP ─────────────────────────────
const App = () => {
  const [guestName, setGuestName] = useState(() => localStorage.getItem('weddingGuest') || '');
  const [tab, setTab] = useState('gallery');
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lightbox, setLightbox] = useState(null);
  const [toast, setToast] = useState(null);
  const [splashDone, setSplashDone] = useState(false);

  useEffect(() => { setTimeout(() => setSplashDone(true), 3400); }, []);

  useEffect(() => {
    if (!guestName) return;
    const fb = window.__firebase;
    if (!fb) { setLoading(false); return; }
    const { db, collection, onSnapshot, query, orderBy } = fb;
    const q = query(collection(db, 'photos'), orderBy('createdAt', 'desc'));
    const unsub = onSnapshot(q, snap => {
      setPhotos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setLoading(false);
    }, () => setLoading(false));
    return unsub;
  }, [guestName]);

  const handleName = name => {
    localStorage.setItem('weddingGuest', name);
    setGuestName(name);
  };

  const updatePhoto = (id, data) => {
    setPhotos(prev => prev.map(p => p.id === id ? {...p, ...data} : p));
    if (lightbox && lightbox.id === id) setLightbox(prev => ({...prev, ...data}));
  };

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2700); };

  return (
    <>
      {/* SPLASH */}
      <div className="splash">
        <div className="splash-flower">🌸</div>
        <h1><span>Nossa</span> História</h1>
        <div className="splash-line"/>
        <p>Galeria do Casamento</p>
      </div>

      {/* APP */}
      {splashDone && (
        <>
          {!guestName && <NameModal onDone={handleName}/>}
          <div id="root-inner" style={{height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden'}}>
            {/* HEADER */}
            <div className="header">
              <div>
                <div className="header-title">🌸 <span>Nossa</span> História</div>
                <div className="header-sub">Galeria do Casamento</div>
              </div>
              <div className="header-date">
                <div style={{fontSize:'0.65rem', color:'var(--gold)', letterSpacing:'0.1em', textTransform:'uppercase'}}>Para sempre</div>
                <div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:'0.9rem', color:'var(--charcoal)'}}>
                  {guestName ? `Olá, ${guestName.split(' ')[0]}` : ''}
                </div>
              </div>
            </div>

            {/* NAV */}
            <div className="nav">
              <button className={`nav-btn ${tab==='gallery'?'active':''}`} onClick={() => setTab('gallery')}>
                <Icon name="grid" width="20" height="20"/>
                <span>Galeria</span>
              </button>
              <button className={`nav-btn nav-upload`} onClick={() => setTab('upload')}>
                <Icon name="camera" width="22" height="22"/>
                <span style={{fontSize:'0.65rem', letterSpacing:'0.08em', textTransform:'uppercase', fontWeight:500}}>Publicar</span>
              </button>
              <button className={`nav-btn ${tab==='feed'?'active':''}`} onClick={() => setTab('feed')}>
                <Icon name="play" width="20" height="20"/>
                <span>Feed</span>
              </button>
            </div>

            {/* CONTENT */}
            <div className="content">
              {tab === 'gallery' && (
                <GalleryView
                  photos={photos} loading={loading}
                  onPhotoClick={(p) => setLightbox(p)}
                />
              )}
              {tab === 'feed' && (
                <FeedView photos={[...photos].reverse()} guestName={guestName} onUpdate={updatePhoto}/>
              )}
              {tab === 'upload' && (
                <UploadView guestName={guestName} onToast={showToast}
                  onUploaded={() => { showToast('Foto publicada! 🌸'); setTab('gallery'); }}/>
              )}
            </div>

            {/* LIGHTBOX */}
            {lightbox && (
              <Lightbox photo={lightbox} guestName={guestName}
                onClose={() => setLightbox(null)} onUpdate={updatePhoto}/>
            )}

            {/* TOAST */}
            {toast && <Toast msg={toast} onDone={() => setToast(null)}/>}
          </div>
        </>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
