<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:#fdf2f5;
  color:#1a1a2e;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{display:none}

/* ── KEYFRAMES ─────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleUp{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes barFill{from{width:0}to{width:100%}}
@keyframes heartPulse{0%,100%{transform:scale(1)}40%{transform:scale(1.4)}70%{transform:scale(.95)}}
@keyframes heartFloat{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  25%{opacity:1;transform:translate(-50%,-60%) scale(1.3)}
  60%{opacity:1;transform:translate(-50%,-75%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-110%) scale(.8)}
}
@keyframes toastIn{
  0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px)}
}
@keyframes particleRise{
  0%{opacity:0;transform:translateY(0) scale(0)}
  30%{opacity:.7}
  100%{opacity:0;transform:translateY(-120px) scale(.3)}
}
@keyframes ringPop{
  0%{opacity:0;transform:scale(0) rotate(-180deg)}
  70%{transform:scale(1.1) rotate(8deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}
@keyframes titleIn{
  0%{opacity:0;transform:translateY(30px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* ── LOADING ────────────────────────────── */
.loading{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,#fff5f7 0%,#fce7ef 40%,#f5d0e3 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.loading-ring{
  width:72px;height:72px;position:relative;
  animation:ringPop .9s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;
}
.loading-ring::before,.loading-ring::after{content:'';position:absolute;border-radius:50%;border:3px solid transparent}
.loading-ring::before{inset:0;border-top-color:#f43f5e;border-right-color:#f43f5e;animation:spin .8s linear infinite}
.loading-ring::after{inset:8px;border-bottom-color:#fb7185;border-left-color:#fb7185;animation:spin 1.2s linear infinite reverse}
.loading-sparkle{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.loading-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:#be123c;animation:fadeUp .7s ease .3s both}
.loading-sub{font-size:.72rem;color:#f9a8d4;letter-spacing:.18em;text-transform:uppercase;animation:fadeUp .7s ease .5s both}
.loading-bar{width:160px;height:3px;background:#fce7ef;border-radius:9px;overflow:hidden;animation:fadeUp .5s ease .6s both}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,#f43f5e,#ec4899);border-radius:9px;animation:barFill 1.5s cubic-bezier(.4,0,.2,1) .6s both}

/* ── HOME ────────────────────────────────── */
.home{
  flex:1;overflow-y:auto;
  background:linear-gradient(160deg,#fff5f7 0%,#fce7ef 45%,#fdf4ff 100%);
  position:relative;
}
/* floating petals */
.petals{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.petal{
  position:absolute;width:8px;height:8px;border-radius:50%;
  background:rgba(244,63,94,.25);
  animation:particleRise var(--dur,5s) ease-in-out var(--del,0s) infinite;
}

.home-inner{
  position:relative;z-index:1;
  min-height:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:50px 24px 140px;text-align:center;
}

/* animated ring ornament */
.ring-ornament{
  width:110px;height:110px;position:relative;margin-bottom:28px;
  animation:ringPop 1s cubic-bezier(.34,1.56,.64,1) .1s both;
}
.ring-o1,.ring-o2,.ring-o3{position:absolute;border-radius:50%;border:3px solid transparent}
.ring-o1{inset:0;border-color:#fecdd3}
.ring-o2{inset:8px;border-color:#fda4af}
.ring-o3{inset:16px;border-color:#f43f5e;display:flex;align-items:center;justify-content:center;font-size:1.8rem}

.home-eyebrow{
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:#f43f5e;font-weight:600;
  background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);
  border-radius:50px;padding:6px 16px;margin-bottom:20px;
  animation:fadeUp .6s ease .2s both;
}
.home-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,13vw,5.5rem);font-weight:600;line-height:1;
  color:#be123c;
  animation:titleIn .8s ease .3s both;
  margin-bottom:8px;
}
.home-title em{font-style:italic;color:#f43f5e}
.home-divider{
  width:52px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#f43f5e,#ec4899);
  margin:16px auto 20px;
  animation:fadeUp .6s ease .4s both;
}
.home-date{
  font-size:1rem;color:#9f1239;font-weight:500;
  animation:fadeUp .6s ease .45s both;margin-bottom:8px;
}
.home-chips{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin-bottom:36px;
  animation:fadeUp .6s ease .5s both;
}
.home-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.7);backdrop-filter:blur(12px);
  border:1px solid rgba(244,63,94,.15);
  border-radius:50px;padding:8px 16px;
  font-size:.8rem;color:#6b2140;font-weight:500;
}
.home-chip svg{width:14px;height:14px;color:#f43f5e}

.home-btns{
  display:flex;flex-direction:column;gap:10px;
  width:100%;max-width:300px;
  animation:fadeUp .6s ease .55s both;
}
.hbtn{
  width:100%;padding:16px 20px;border-radius:18px;border:none;
  cursor:pointer;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s ease;
}
.hbtn:active{transform:scale(.96)}
.hbtn-primary{
  background:linear-gradient(135deg,#f43f5e,#ec4899);color:#fff;
  box-shadow:0 8px 24px rgba(244,63,94,.3);
}
.hbtn-primary:hover{box-shadow:0 12px 32px rgba(244,63,94,.45);transform:translateY(-1px)}
.hbtn-white{
  background:#fff;color:#f43f5e;
  border:2px solid rgba(244,63,94,.2);
  box-shadow:0 4px 16px rgba(0,0,0,.06);
}
.hbtn-white:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-1px)}
.hbtn-ghost{
  background:rgba(255,255,255,.5);color:#9f1239;
  border:1.5px solid rgba(244,63,94,.2);
}
.hbtn svg{width:18px;height:18px}

.home-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:100%;max-width:300px;margin-top:32px;
  animation:fadeUp .6s ease .65s both;
}
.stat{
  background:rgba(255,255,255,.65);backdrop-filter:blur(16px);
  border:1px solid rgba(244,63,94,.1);
  border-radius:18px;padding:16px 8px;text-align:center;
}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:600;color:#f43f5e;line-height:1;
}
.stat-l{font-size:.62rem;color:#9f1239;letter-spacing:.1em;text-transform:uppercase;margin-top:4px;opacity:.7}

.scroll-hint{
  margin-top:32px;font-size:.75rem;color:#f9a8d4;
  display:flex;align-items:center;gap:6px;justify-content:center;
  animation:bounce 2s ease infinite,fadeUp .6s ease .8s both;
}

/* ── BOTTOM NAV ──────────────────────────── */
.bnav{
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(244,63,94,.12);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px max(10px,env(safe-area-inset-bottom));
  flex-shrink:0;z-index:100;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 18px;border-radius:16px;border:none;
  background:transparent;cursor:pointer;
  color:#d4899a;font-family:inherit;
  transition:all .2s ease;
}
.bnav-btn svg{width:21px;height:21px;stroke-width:1.8;transition:all .2s}
.bnav-btn span{font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;font-weight:600}
.bnav-btn.on{color:#f43f5e}
.bnav-btn.on svg{stroke-width:2.3}
.bnav-cam{
  background:linear-gradient(135deg,#f43f5e,#ec4899) !important;
  color:#fff !important;padding:14px 26px !important;
  border-radius:20px !important;
  box-shadow:0 6px 20px rgba(244,63,94,.38);
  transform:translateY(-6px);
}
.bnav-cam:active{transform:translateY(-3px) scale(.95) !important}

/* ── GALLERY ──────────────────────────────── */
.gallery{
  flex:1;overflow-y:auto;
  background:linear-gradient(160deg,#fff5f7 0%,#fce7ef 60%,#fdf4ff 100%);
}
.gallery-hd{
  padding:20px 18px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(253,242,245,.85);backdrop-filter:blur(20px);
}
.gallery-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#be123c}
.gallery-hd-sub{font-size:.7rem;color:#f9a8d4;margin-top:1px;letter-spacing:.05em}
.gallery-pill{
  background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.18);
  border-radius:50px;padding:6px 14px;
  font-size:.72rem;color:#f43f5e;font-weight:600;
}
.gallery-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:3px;padding:0 3px 20px;
}
@media(min-width:480px){.gallery-grid{grid-template-columns:repeat(3,1fr)}}
.gallery-cell{
  aspect-ratio:1;overflow:hidden;position:relative;cursor:pointer;
  background:#fce7ef;border-radius:4px;
}
.gallery-cell:first-child{border-radius:18px 4px 4px 4px}
.gallery-cell:nth-child(2){border-radius:4px 18px 4px 4px}
.gallery-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.gallery-cell:hover img,.gallery-cell:active img{transform:scale(1.07)}
.gallery-cell-ov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(190,18,60,.65) 0%,transparent 50%);
  opacity:0;transition:opacity .25s;
  display:flex;align-items:flex-end;padding:9px;
}
.gallery-cell:hover .gallery-cell-ov{opacity:1}
.gallery-cell-stats{display:flex;gap:8px;color:#fff;font-size:.7rem;font-weight:500}
.gallery-liked{
  position:absolute;top:7px;right:7px;
  width:20px;height:20px;border-radius:50%;
  background:#f43f5e;display:flex;align-items:center;justify-content:center;
}
/* shimmer skeleton */
.g-skel{
  aspect-ratio:1;border-radius:4px;
  background:linear-gradient(90deg,#fce7ef 25%,#fdf2f5 50%,#fce7ef 75%);
  background-size:600px 100%;
  animation:shimmer 1.4s infinite;
}
.gallery-empty{
  text-align:center;padding:72px 32px;
}
.gallery-empty .emoji{font-size:3rem;display:block;margin-bottom:14px}
.gallery-empty h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:#be123c;margin-bottom:6px}
.gallery-empty p{font-size:.8rem;color:#d4899a;line-height:1.6}

/* ── FEED ─────────────────────────────────── */
.feed-wrap{flex:1;overflow:hidden;background:#000;position:relative}
.feed-scroll{
  height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}
/* each slide */
.slide{
  height:100%;
  scroll-snap-align:start;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.slide-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform .9s cubic-bezier(.25,.46,.45,.94);
  will-change:transform;
}
.slide.is-cur .slide-img{transform:scale(1.04)}
/* gradient */
.slide-grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.45) 0%,
    transparent 30%,
    transparent 52%,
    rgba(0,0,0,.88) 100%
  );
}
/* story bars */
.slide-bars{
  position:absolute;top:0;left:0;right:0;
  padding:14px 14px 0;
  display:flex;gap:3px;z-index:20;
}
.bar-seg{flex:1;height:2.5px;border-radius:2px;background:rgba(255,255,255,.3);overflow:hidden}
.bar-fill{height:100%;background:#fff;border-radius:2px;transition:width .25s}
/* header row */
.slide-header{
  position:absolute;top:24px;left:0;right:0;
  padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:20;
}
.slide-header-label{
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;font-style:italic;color:rgba(255,255,255,.75);
}
.slide-header-right{display:flex;align-items:center;gap:8px}
.slide-counter{
  background:rgba(0,0,0,.3);backdrop-filter:blur(8px);
  border-radius:50px;padding:4px 11px;
  font-size:.7rem;color:rgba(255,255,255,.7);font-weight:500;
}
.slide-add{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#f43f5e,#ec4899);
  border:none;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(244,63,94,.45);
  transition:transform .18s;
}
.slide-add:active{transform:scale(.88)}
/* right action buttons */
.slide-actions{
  position:absolute;right:12px;bottom:112px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  z-index:20;
}
.slide-av{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#f43f5e,#ec4899);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.78rem;color:#fff;
  border:2.5px solid rgba(255,255,255,.5);
}
.act-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;border:none;background:none;
  color:#fff;font-family:inherit;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
  transition:transform .14s;
}
.act-btn:active{transform:scale(.82)}
.act-ic{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.22);
  transition:all .2s;
}
.act-ic.liked{background:rgba(244,63,94,.4);border-color:rgba(244,63,94,.6)}
.act-ic.liked svg{animation:heartPulse .35s ease}
.act-btn svg{width:22px;height:22px;stroke-width:1.8}
.act-n{font-size:.7rem;font-weight:600}
/* bottom info */
.slide-info{
  position:absolute;left:14px;right:72px;bottom:28px;
  z-index:20;
}
.slide-user{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.slide-uav{
  width:35px;height:35px;border-radius:50%;
  background:linear-gradient(135deg,#f43f5e,#ec4899);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:#fff;
  border:2px solid rgba(255,255,255,.35);flex-shrink:0;
}
.slide-uname{font-size:.88rem;font-weight:600;color:#fff}
.slide-cap{font-size:.82rem;color:rgba(255,255,255,.84);line-height:1.45;margin-bottom:5px;max-width:252px}
.slide-when{font-size:.66rem;color:rgba(255,255,255,.42)}
.slide-music{display:flex;align-items:center;gap:7px;margin-top:9px;overflow:hidden}
.slide-music svg{width:13px;height:13px;flex-shrink:0;color:rgba(255,255,255,.45)}
.slide-music-txt{font-size:.7rem;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden}
/* double-tap heart */
.dt-heart{
  position:absolute;left:50%;top:50%;
  font-size:5.5rem;pointer-events:none;z-index:30;
  animation:heartFloat .9s ease forwards;
}
/* feed empty */
.feed-empty{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  text-align:center;padding:40px;background:#000;
}
.feed-empty h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:rgba(255,255,255,.65)}
.feed-empty p{font-size:.8rem;color:rgba(255,255,255,.3);line-height:1.6}

/* ── UPLOAD ───────────────────────────────── */
.upload{
  flex:1;overflow-y:auto;
  background:linear-gradient(160deg,#fff5f7 0%,#fce7ef 60%,#fdf4ff 100%);
  padding:24px 20px 50px;
}
.upload-hd{text-align:center;margin-bottom:24px}
.upload-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:600;color:#be123c;margin-bottom:5px}
.upload-hd p{font-size:.8rem;color:#d4899a;line-height:1.5}

.dropzone{
  border:2px dashed rgba(244,63,94,.3);
  border-radius:22px;padding:44px 20px;
  text-align:center;cursor:pointer;
  background:rgba(255,255,255,.6);backdrop-filter:blur(8px);
  transition:all .25s ease;position:relative;overflow:hidden;
  margin-bottom:18px;
}
.dropzone:hover,.dropzone.on{border-color:#f43f5e;background:rgba(244,63,94,.05);transform:scale(1.01)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dropzone-ic{
  width:60px;height:60px;border-radius:18px;margin:0 auto 14px;
  background:linear-gradient(135deg,rgba(244,63,94,.15),rgba(236,72,153,.15));
  display:flex;align-items:center;justify-content:center;
}
.dropzone-ic svg{width:26px;height:26px;color:#f43f5e;stroke-width:1.6}
.dropzone h3{font-size:.97rem;font-weight:600;color:#be123c;margin-bottom:4px}
.dropzone p{font-size:.76rem;color:#d4899a}

.prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.prev-cell{aspect-ratio:1;border-radius:14px;overflow:hidden;position:relative}
.prev-cell img{width:100%;height:100%;object-fit:cover;display:block}
.prev-rm{
  position:absolute;top:5px;right:5px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(190,18,60,.75);color:#fff;border:none;
  cursor:pointer;font-size:.65rem;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.prev-rm:hover{background:#f43f5e}
.f-lbl{font-size:.7rem;color:#d4899a;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;font-weight:600}
.f-input{
  width:100%;padding:14px 17px;
  background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
  border:1.5px solid rgba(244,63,94,.2);
  border-radius:16px;color:#1a1a2e;
  font-family:'Inter',sans-serif;font-size:.88rem;

/* ── TOAST ────────────────────────────────── */
.toast{
  position:fixed;bottom:92px;left:50%;
  z-index:900;padding:11px 20px;
  background:#fff;border:1.5px solid rgba(244,63,94,.25);
  border-radius:50px;font-size:.8rem;color:#be123c;font-weight:500;

  white-space:nowrap;pointer-events:none;
  animation:toastIn 2.7s ease forwards;
}
  /* ── SLIDESHOW ──────────────────────────────────────────── */
.ss-overlay{
position:fixed;inset:0;z-index:2000;
background:#000;
display:flex;flex-direction:column;
animation:fadeIn .4s ease;
}
/* Força orientação landscape no mobile via CSS rotation trick */
@media(max-width:768px) and (orientation:portrait){
.ss-overlay{
width:100dvh;
height:100dvw;
transform-origin:bottom left;
transform:rotate(90deg) translateY(-100%);
overflow:hidden;
}
}
/* Slide individual */
.ss-slide{
position:absolute;inset:0;
background-size:cover;
background-position:center;
opacity:0;
transition:opacity 1s ease;
will-change:opacity;
}
.ss-slide.ss-visible{opacity:1}
.ss-slide.ss-exit{opacity:0}
/* Zoom Ken Burns */
.ss-slide.ss-zoom{
animation:ssZoom var(--dur, 6s) ease forwards;
}
@keyframes ssZoom{
0%{transform:scale(1)}
100%{transform:scale(1.08)}
}
/* Gradient escuro nas bordas para dar foco */
.ss-slide::after{
content:'';position:absolute;inset:0;
background:radial-gradient(ellipse at center,
transparent 40%,
rgba(0,0,0,.45) 100%
);
}
/* Barra de progresso do slide atual */
.ss-progress{
position:absolute;bottom:0;left:0;
height:3px;
background:linear-gradient(90deg,#f43f5e,#ec4899);
border-radius:0 2px 0 0;
transition:none;
z-index:10;
}
@keyframes ssProgressAnim{
from{width:0}
to{width:100%}
}
.ss-progress.animating{
animation:ssProgressAnim var(--dur,6s) linear forwards;
}
/* Dots indicadores */
.ss-dots{
position:absolute;bottom:16px;left:50%;
transform:translateX(-50%);
display:flex;gap:6px;align-items:center;
z-index:10;
}
.ss-dot{
width:6px;height:6px;border-radius:50%;
background:rgba(255,255,255,.35);
transition:all .3s ease;
}
.ss-dot.on{
background:#fff;
transform:scale(1.4);
}
/* Painel de controles (aparece ao hover/tap) */
.ss-controls{
position:absolute;inset:0;z-index:20;
display:flex;flex-direction:column;
justify-content:space-between;
padding:20px;
opacity:0;
transition:opacity .3s ease;
pointer-events:none;
}
.ss-overlay:hover .ss-controls,
.ss-controls.visible{
opacity:1;pointer-events:all;
}
.ss-controls-top{
display:flex;align-items:center;justify-content:space-between;
}
.ss-controls-bottom{
display:flex;align-items:center;justify-content:center;gap:20px;
}
/* Título overlay */
.ss-title{
font-family:'Cormorant Garamond',serif;
font-size:clamp(.9rem,3vw,1.4rem);
font-style:italic;
color:rgba(255,255,255,.8);
text-shadow:0 2px 12px rgba(0,0,0,.8);
letter-spacing:.04em;
}
.ss-sub{
font-size:clamp(.6rem,2vw,.75rem);
color:rgba(255,255,255,.45);
letter-spacing:.15em;
text-transform:uppercase;
margin-top:3px;
}
/* Botões de controle */
.ss-btn{
width:44px;height:44px;border-radius:50%;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.2);
color:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all .2s;font-family:inherit;
}
.ss-btn:hover{background:rgba(255,255,255,.28)}
.ss-btn:active{transform:scale(.9)}
.ss-btn svg{width:18px;height:18px;stroke-width:2}
.ss-btn-exit{
background:rgba(244,63,94,.25);
border-color:rgba(244,63,94,.4);
}
.ss-btn-exit:hover{background:rgba(244,63,94,.45)}
/* Botão play/pause grande */
.ss-btn-play{
width:54px;height:54px;border-radius:50%;
background:linear-gradient(135deg,#f43f5e,#ec4899);
border:none;color:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:0 6px 20px rgba(244,63,94,.45);
transition:all .2s;font-family:inherit;
}
.ss-btn-play:hover{box-shadow:0 8px 28px rgba(244,63,94,.6);transform:scale(1.06)}
.ss-btn-play:active{transform:scale(.93)}
.ss-btn-play svg{width:22px;height:22px;stroke-width:2}
/* Info da foto atual */
.ss-photo-info{
position:absolute;left:20px;bottom:40px;z-index:10;
max-width:60%;
opacity:0;transition:opacity .3s ease;pointer-events:none;
}
.ss-overlay:hover .ss-photo-info,
.ss-controls.visible~.ss-photo-info{opacity:1}
.ss-photo-author{
font-size:.8rem;font-weight:600;color:#fff;
text-shadow:0 2px 8px rgba(0,0,0,.8);
margin-bottom:3px;
}
.ss-photo-caption{
font-size:.75rem;color:rgba(255,255,255,.65);
text-shadow:0 1px 6px rgba(0,0,0,.8);
line-height:1.4;
max-width:280px;
}
/* Speed selector */
.ss-speed-wrap{
display:flex;align-items:center;gap:8px;
}
.ss-speed-label{
font-size:.65rem;color:rgba(255,255,255,.5);
letter-spacing:.1em;text-transform:uppercase;
}
.ss-speed-btn{
padding:5px 11px;border-radius:50px;border:1px solid rgba(255,255,255,.2);
background:transparent;color:rgba(255,255,255,.5);
cursor:pointer;font-family:inherit;font-size:.7rem;font-weight:600;
transition:all .2s;
}
.ss-speed-btn.on{
background:rgba(244,63,94,.35);
border-color:rgba(244,63,94,.5);
color:#fff;
}

.ss-rotate-hint{
position:absolute;inset:0;z-index:30;
background:rgba(0,0,0,.88);
display:none;flex-direction:column;align-items:center;justify-content:center;
gap:16px;text-align:center;padding:40px;
}
/ Apenas mostra no portrait em telas pequenas quando NÃO estiver rotacionado pelo CSS /
@media(max-width:600px) and (orientation:portrait){
.ss-rotate-hint{display:none} / CSS já rotaciona, não precisa do hint */
}
.ss-rotate-icon{font-size:3rem;animation:rotateHint 2s ease infinite}
@keyframes rotateHint{
0%,100%{transform:rotate(0deg)}
50%{transform:rotate(90deg)}
}
.ss-rotate-hint h3{
font-family:'Cormorant Garamond',serif;
font-size:1.3rem;color:#fff;
}
.ss-rotate-hint p{font-size:.8rem;color:rgba(255,255,255,.5)}
/* Entrada do botão de slideshow na nav bottom */
.bnav-ss{
background:rgba(244,63,94,.08);
border:1.5px solid rgba(244,63,94,.2) !important;
color:#f43f5e !important;
}
.bnav-ss.on{
background:rgba(244,63,94,.18) !important;
color:#f43f5e !important;
}
  
@media(max-width:768px){
  .bnav-btn.bnav-ss{
    display:none !important;
    visibility:hidden !important;
    width:0 !important;
    padding:0 !important;
    overflow:hidden !important;
  }
}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── DEMO DATA ─────────────────────────────────────── */
const DEMO = [
  { id:'d1', url:'https://images.unsplash.com/photo-1519741497674-611481863552?w=800&h=1200&fit=crop', caption:'Que momento incrível! ❤️ Os noivos estão radiantes!', author:'Maria Silva', createdAt:new Date(), likes:['Carlos','Ana','Bia'], comments:[{author:'João',text:'Lindo casal!',time:new Date().toISOString()},{author:'Ana',text:'Que emoção! 😍',time:new Date().toISOString()}] },
  { id:'d2', url:'https://images.unsplash.com/photo-1511285560982-1356c11d4606?w=800&h=1200&fit=crop', caption:'Os noivos estão radiantes! ✨ Momento perfeito', author:'Pedro Santos', createdAt:new Date(), likes:['Maria','Lucas','Fernanda'], comments:[{author:'Ana',text:'Que casal perfeito!',time:new Date().toISOString()}] },
  { id:'d3', url:'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=800&h=1200&fit=crop', caption:'A decoração está maravilhosa! 🌸', author:'Carla Oliveira', createdAt:new Date(), likes:['Beatriz'], comments:[] },
  { id:'d4', url:'https://images.unsplash.com/photo-1522673607200-1645062cd958?w=800&h=1200&fit=crop', caption:'A primeira dança foi emocionante! 💕', author:'Lucas Ferreira', createdAt:new Date(), likes:['Julia','Marcos','Pedro','Maria'], comments:[{author:'Julia',text:'Chorei muito!',time:new Date().toISOString()}] },
  { id:'d5', url:'https://images.unsplash.com/photo-1519225421980-715cb0202128?w=800&h=1200&fit=crop', caption:'O bolo estava delicioso! 🎂', author:'Fernanda Costa', createdAt:new Date(), likes:['Carlos'], comments:[] },
  { id:'d6', url:'https://images.unsplash.com/photo-1520854221256-17451cc330e7?w=800&h=1200&fit=crop', caption:'Padrinhos arrasando! 👔👗', author:'Rafael Almeida', createdAt:new Date(), likes:['Patricia','Ana'], comments:[{author:'Patricia',text:'Que elegância!',time:new Date().toISOString()}] },
];

/* ─── HELPERS ───────────────────────────────────────── */
const ini = n => n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const ago = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = (Date.now()-d)/1000;
  if (s<60) return 'agora'; if (s<3600) return `${Math.floor(s/60)}min`;
  if (s<86400) return `${Math.floor(s/3600)}h`;
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
};

/* ─── ICON FACTORY ──────────────────────────────────── */
const Ic = (paths, extra={}) => props => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...extra} {...props}>
    {(Array.isArray(paths)?paths:[paths]).map((d,i)=><path key={i} d={d}/>)}
  </svg>
);
const HeartIc   = Ic("M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z");
const CommentIc = Ic("M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z");
const CamIc     = Ic(["M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z","M12 13m-4 0a4 4 0 1 0 8 0a4 4 0 1 0-8 0"]);
const GridIc    = Ic(["M3 3h7v7H3z","M14 3h7v7H14z","M3 14h7v7H3z","M14 14h7v7H14z"]);
const PlayIc    = Ic("M5 3l14 9-14 9V3z");
const DownIc    = Ic(["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M7 10l5 5 5-5","M12 15V3"]);
const SendIc    = Ic(["M22 2L11 13","M22 2l-7 20-4-9-9-4 20-7"]);
const XIc       = Ic(["M18 6l-12 12","M6 6l12 12"]);
const PlusIc    = Ic(["M12 5v14","M5 12h14"]);
const CalIc     = Ic(["M8 2v4M16 2v4M3 10h18","M21 8H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2z"]);
const PinIc     = Ic(["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z","M12 10m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"]);
const MusicIc   = Ic("M9 18V5l12-2v13M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6z");
const HomeIc    = Ic(["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10"]);
const SparkleIc = Ic("M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z");

/* ─── TOAST ─────────────────────────────────────────── */
const Toast = ({msg, onDone}) => {
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast">✦ {msg}</div>;
};

/* ─── COMMENTS SHEET ────────────────────────────────── */
const CommentsSheet = ({photo, guest, onClose, onAdd}) => {
  const [txt, setTxt] = useState('');
  const send = () => { if(txt.trim()){onAdd(photo,txt);setTxt('');} };
  return (
    <div className="sh-ov" onClick={onClose} style={{animation:'fadeIn .22s ease'}}>
      <div className="sh" onClick={e=>e.stopPropagation()} style={{animation:'slideUp .32s cubic-bezier(.34,1.56,.64,1)'}}>
        <div className="sh-handle"/>
        <div className="sh-title">💬 {(photo.comments||[]).length} comentários</div>
        <div className="sh-list">
          {!(photo.comments||[]).length
            ? <div className="com-empty">Seja o primeiro a comentar 💕</div>
            : (photo.comments||[]).map((c,i)=>(
              <div key={i} className="com-row">
                <div className="com-av">{ini(c.author)}</div>
                <div className="com-body">
                  <div className="com-name">{c.author}</div>
                  <div className="com-text">{c.text}</div>
                  <div className="com-when">{ago(c.time)}</div>
                </div>
              </div>
            ))
          }
        </div>
        <div className="sh-input-row">
          <div className="com-av" style={{flexShrink:0}}>{ini(guest)}</div>
          <input className="sh-input" placeholder="Deixe uma mensagem…" value={txt}
            onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
          <button className="sh-send" onClick={send}><SendIc width="14" height="14" strokeWidth="2.3"/></button>
        </div>
      </div>
    </div>
  );
};

/* ─── LIGHTBOX ──────────────────────────────────────── */
const Lightbox = ({photo, guest, onClose, onLike, onComment}) => {
  const [com, setCom] = useState(false);
  const liked = (photo.likes||[]).includes(guest);
  return (
    <div className="lightbox">
      <div className="lb-hd">
        <div className="lb-user">
          <div className="lb-av">{ini(photo.author)}</div>
          <div>
            <div className="lb-uname">{photo.author}</div>
            <div className="lb-utime">{ago(photo.createdAt)}</div>
          </div>
        </div>
        <button className="lb-close" onClick={onClose}><XIc width="14" height="14" strokeWidth="2.4"/></button>

/* ─── FEED ──────────────────────────────────────────── */
const Feed = ({photos, guest, onUpdate, onUpload}) => {
  const [idx,   setIdx]    = useState(0);
  const [heart, setHeart]  = useState(false);
  const [lastT, setLastT]  = useState(0);
  const [com,   setCom]    = useState(null);
  const ref = useRef();

  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const fn=()=>{ const i=Math.round(el.scrollTop/el.clientHeight); if(i!==idx) setIdx(i); };
    el.addEventListener('scroll',fn,{passive:true});
    return()=>el.removeEventListener('scroll',fn);
  },[idx]);

  const like = async photo => {
    const likes=photo.likes||[]; const on=likes.includes(guest);
    const nl=on?likes.filter(n=>n!==guest):[...likes,guest];
    onUpdate(photo.id,{likes:nl});
    try{const fb=window.__fb;if(fb)await fb.updateDoc(fb.doc(fb.db,'photos',photo.id),{likes:nl});}catch(e){}
  };

  const addCom = async (photo,txt) => {
    const c={author:guest,text:txt.trim(),time:new Date().toISOString()};
    const nc=[...(photo.comments||[]),c];
    onUpdate(photo.id,{comments:nc});
    try{const fb=window.__fb;if(fb)await fb.updateDoc(fb.doc(fb.db,'photos',photo.id),{comments:nc});}catch(e){}
  };

  const tap = photo => {
    const now=Date.now();
    if(now-lastT<300){if(!(photo.likes||[]).includes(guest))like(photo);setHeart(true);setTimeout(()=>setHeart(false),950);}
    setLastT(now);
  };

  if(!photos.length) return (
    <div className="feed-wrap">
      <div className="feed-empty">
        <div style={{fontSize:'2.8rem'}}>🎞️</div>
        <h3>Nenhuma foto ainda</h3>
        <p>Seja o primeiro a compartilhar um momento desta celebração</p>
        <button style={{marginTop:'12px',padding:'13px 28px',background:'linear-gradient(135deg,#f43f5e,#ec4899)',color:'#fff',border:'none',borderRadius:'50px',cursor:'pointer',fontFamily:'Inter,sans-serif',fontSize:'.9rem',fontWeight:600,display:'flex',alignItems:'center',gap:'8px'}} onClick={onUpload}>
          <CamIc width="17" height="17" strokeWidth="1.8"/> Compartilhar
        </button>
      </div>
    </div>
  );

  return (
    <div className="feed-wrap">
      <div className="feed-scroll" ref={ref}>
        {photos.map((p,i)=>{
          const liked=(p.likes||[]).includes(guest);
          const cur=i===idx;
          return (
            <div key={p.id} className={`slide ${cur?'is-cur':''}`} onClick={()=>tap(p)}>
              <div className="slide-img" style={{backgroundImage:`url(${p.url})`}}/>
              <div className="slide-grad"/>
              {cur&&heart&&<div className="dt-heart">❤️</div>}

              {/* story bars */}
              <div className="slide-bars">
                {photos.slice(0,Math.min(photos.length,8)).map((_,j)=>(
                  <div key={j} className="bar-seg">
                    <div className="bar-fill" style={{width:j<i?'100%':j===i?'50%':'0%'}}/>
                  </div>
                ))}
              </div>

              {/* header */}
              <div className="slide-header">
                <div className="slide-header-label">✦ Nossa História</div>
                <div className="slide-header-right">
                  <div className="slide-counter">{i+1} / {photos.length}</div>
                  <button className="slide-add" onClick={e=>{e.stopPropagation();onUpload();}}>
                    <PlusIc width="15" height="15" strokeWidth="2.6"/>
                  </button>
                </div>
              </div>

              {/* right actions */}
              <div className="slide-actions" onClick={e=>e.stopPropagation()}>
                <div className="slide-av">{ini(p.author)}</div>
                <button className="act-btn" onClick={()=>like(p)}>
                  <div className={`act-ic ${liked?'liked':''}`}>
                    <HeartIc width="22" height="22" strokeWidth={liked?0:1.8} style={{fill:liked?'#f43f5e':'none'}}/>
                  </div>
                  <span className="act-n">{(p.likes||[]).length}</span>
                </button>
                <button className="act-btn" onClick={()=>setCom(p)}>
                  <div className="act-ic">
                    <CommentIc width="22" height="22" strokeWidth="1.8"/>
                  </div>
                  <span className="act-n">{(p.comments||[]).length}</span>
                </button>
                <button className="act-btn" onClick={()=>{const a=document.createElement('a');a.href=p.url;a.download='casamento.jpg';a.click();}}>
                  <div className="act-ic">
                    <DownIc width="22" height="22" strokeWidth="1.8"/>
                  </div>
                  <span className="act-n">salvar</span>
                </button>
              </div>

              {/* bottom info */}
              <div className="slide-info">
                <div className="slide-user">
                  <div className="slide-uav">{ini(p.author)}</div>
                  <span className="slide-uname">{p.author}</span>
                </div>
                {p.caption&&<p className="slide-cap">{p.caption}</p>}
                <div className="slide-when">{ago(p.createdAt)}</div>
                <div className="slide-music">
                  <MusicIc width="13" height="13" strokeWidth="1.8"/>
                  <div className="slide-music-txt">Trilha do Casamento · Música Romântica</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {com&&<CommentsSheet photo={com} guest={guest} onClose={()=>setCom(null)} onAdd={addCom}/>}
    </div>
  );
};

/* ─── UPLOAD ────────────────────────────────────────── */
const Upload = ({guest, onDone, onToast}) => {
  const [files, setFiles] = useState([]);
  const [prevs, setPrevs] = useState([]);
  const [cap, setCap]     = useState('');
  const [busy, setBusy]   = useState(false);
  const [prog, setProg]   = useState(0);
  const [drag, setDrag]   = useState(false);

  const add = list => {
    const arr=Array.from(list).filter(f=>f.type.startsWith('image/')).slice(0,9);
    setFiles(arr); setPrevs(arr.map(f=>URL.createObjectURL(f)));
  };
  const rm = i => { setFiles(f=>f.filter((_,j)=>j!==i)); setPrevs(p=>p.filter((_,j)=>j!==i)); };

  const submit = async () => {
    if(!files.length) return;
    const fb=window.__fb;
    if(!fb){onToast('Configure o Firebase primeiro!');return;}
    const{db,storage,collection,addDoc,ref,uploadBytes,getDownloadURL,serverTimestamp}=fb;
    setBusy(true);
    try{
      for(let i=0;i<files.length;i++){
        const f=files[i],r=ref(storage,`photos/${Date.now()}_${f.name}`);
        await uploadBytes(r,f);const url=await getDownloadURL(r);
        await addDoc(collection(db,'photos'),{url,author:guest,caption:cap,likes:[],comments:[],createdAt:serverTimestamp()});
        setProg(Math.round(((i+1)/files.length)*100));
      }
      onToast(`${files.length} foto${files.length>1?'s':''} publicada${files.length>1?'s':''}! 🌸`);
      setFiles([]);setPrevs([]);setCap('');onDone();
    }catch(e){console.error(e);onToast('Erro ao enviar. Verifique o Firebase.');}
    finally{setBusy(false);setProg(0);}
  };

  return (
    <div className="upload" style={{animation:'fadeIn .3s ease'}}>
      <div className="upload-hd">
        <h2>Compartilhar Foto</h2>
        <p>Eternize seu momento nesta galeria de amor</p>
      </div>

      <div className={`dropzone ${drag?'on':''}`}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);add(e.dataTransfer.files);}}>
        <input type="file" accept="image/*" multiple capture="environment" onChange={e=>add(e.target.files)}/>
        <div className="dropzone-ic"><CamIc width="26" height="26"/></div>
        <h3>{files.length?`${files.length} foto${files.length>1?'s':''} selecionada${files.length>1?'s':''}` : 'Toque para fotografar'}</h3>
        <p>{files.length?'Toque para trocar':'ou escolha da galeria · até 9 fotos'}</p>
      </div>

      {prevs.length>0 && (
        <>
          <div className="prev-grid">
            {prevs.map((s,i)=>(
              <div key={i} className="prev-cell" style={{animation:'scaleUp .28s ease'}}>
                <img src={s} alt=""/>
                <button className="prev-rm" onClick={()=>rm(i)}>✕</button>
              </div>
            ))}
          </div>
          <div className="f-lbl">Legenda</div>
          <textarea className="f-input" placeholder="Conte sobre este momento especial…"
            value={cap} onChange={e=>setCap(e.target.value)} maxLength={200}/>
          {busy&&<div className="prog"><div className="prog-bar" style={{width:`${prog}%`}}/></div>}
          <button className="btn-submit" onClick={submit} disabled={busy}>
            {busy?`Publicando… ${prog}%`:'✦ Publicar na galeria'}
          </button>
        </>
      )}

      <div className="upload-tip">
        <span>💌</span>
        <p>Suas fotos são publicadas diretamente na galeria dos noivos e ficam visíveis para todos os convidados em tempo real.</p>
      </div>
    </div>
  );
};
/* ─── SLIDESHOW ─────────────────────────────────────── */
const Slideshow = ({photos, onClose}) => {
const SPEEDS = [{label:'3s',val:3000},{label:'5s',val:5000},{label:'8s',val:8000}];
const [cur,      setCur]      = React.useState(0);
const [paused,   setPaused]   = React.useState(false);
const [speed,    setSpeed]    = React.useState(1); // index into SPEEDS
const [showCtrl, setShowCtrl] = React.useState(true);
const [key,      setKey]      = React.useState(0); // força reset da animação
const timerRef  = React.useRef(null);
const ctrlTimer = React.useRef(null);
const dur = SPEEDS[speed].val;
// Auto-advance
React.useEffect(()=>{
if(paused || !photos.length) return;
clearTimeout(timerRef.current);
timerRef.current = setTimeout(()=>{
setCur(c=>(c+1)%photos.length);
setKey(k=>k+1);
}, dur);
return ()=>clearTimeout(timerRef.current);
},[cur, paused, dur, photos.length]);
  // Entra em fullscreen ao abrir, sai ao fechar
  React.useEffect(()=>{
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(req) req.call(el).catch(()=>{});
    return ()=>{
      const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
      if(ex) ex.call(document).catch(()=>{});
    };
  },[]);
// Auto-hide controls
React.useEffect(()=>{
if(!showCtrl) return;
clearTimeout(ctrlTimer.current);
ctrlTimer.current = setTimeout(()=>setShowCtrl(false), 3500);
return ()=>clearTimeout(ctrlTimer.current);
},[showCtrl]);
const prev = ()=>{ setCur(c=>(c-1+photos.length)%photos.length); setKey(k=>k+1); };
const next = ()=>{ setCur(c=>(c+1)%photos.length); setKey(k=>k+1); };
const tap  = ()=>{ setShowCtrl(true); };
if(!photos.length) return null;
const photo = photos[cur];
return (
<div className="ss-overlay" onClick={tap}>
  {/* Slides — renderiza atual, anterior e próximo para crossfade suave */}
  {photos.map((p,i)=>(
    <div
      key={p.id}
      className={`ss-slide ${i===cur?'ss-visible ss-zoom':''}`}
      style={{
        backgroundImage:`url(${p.url})`,
        '--dur':`${dur}ms`,
        zIndex: i===cur ? 2 : 1,
      }}
    />
  ))}

  {/* Barra de progresso */}
  {!paused && (
    <div
      key={`prog-${key}`}
      className="ss-progress animating"
      style={{'--dur':`${dur}ms`}}
    />
  )}

  {/* Info da foto */}
  <div className={`ss-photo-info ${showCtrl?'':'hidden'}`}
    style={{opacity:showCtrl?1:0,transition:'opacity .3s',position:'absolute',left:20,bottom:44,zIndex:10,maxWidth:'60%',pointerEvents:'none'}}>
    <div className="ss-photo-author">📷 {photo.author}</div>
    {photo.caption && <div className="ss-photo-caption">{photo.caption}</div>}
  </div>

  {/* Dots */}
  {photos.length <= 12 && (
    <div className="ss-dots" style={{zIndex:showCtrl?10:5,opacity:showCtrl?.9:.3,transition:'opacity .3s'}}>
      {photos.map((_,i)=>(
        <div key={i} className={`ss-dot ${i===cur?'on':''}`}
          onClick={e=>{e.stopPropagation();setCur(i);setKey(k=>k+1);}}/>
      ))}
    </div>
  )}

  {/* Painel de controles */}
  <div
    className={`ss-controls ${showCtrl?'visible':''}`}
    onClick={e=>e.stopPropagation()}
  >
    {/* Topo */}
    <div className="ss-controls-top">
      <div>
        <div className="ss-title">✦ Nossa História</div>
        <div className="ss-sub">{cur+1} / {photos.length}</div>
      </div>
      <button className="ss-btn ss-btn-exit" onClick={()=>{
            const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen;
            if(ex) ex.call(document).catch(()=>{});
            onClose();
          }}>
            <XIc width="18" height="18" strokeWidth="2.2"/>
          </button>
    </div>

    {/* Controles centrais */}
    <div className="ss-controls-bottom">
      {/* Prev */}
      <button className="ss-btn" onClick={prev}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" strokeWidth="2.2">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
      </button>

      {/* Play / Pause */}
      <button className="ss-btn-play" onClick={()=>setPaused(p=>!p)}>
        {paused
          ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22" strokeWidth="2"><polygon points="5,3 19,12 5,21"/></svg>
          : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22" strokeWidth="2"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg>
        }
      </button>

      {/* Next */}
      <button className="ss-btn" onClick={next}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" strokeWidth="2.2">
          <polyline points="9,18 15,12 9,6"/>
        </svg>
      </button>

      {/* Speed selector */}
      <div className="ss-speed-wrap" style={{marginLeft:12}}>
        <span className="ss-speed-label">Vel.</span>
        {SPEEDS.map((s,i)=>(
          <button key={i} className={`ss-speed-btn ${i===speed?'on':''}`}
            onClick={()=>{setSpeed(i);setKey(k=>k+1);}}>
            {s.label}
          </button>
        ))}
      </div>
    </div>
  </div>
</div>
);
};

/* ─── ROOT APP ──────────────────────────────────────── */
const App = () => {
  const [guest,   setGuest]   = useState(()=>localStorage.getItem('wg')||'');
  const [tab,     setTab]     = useState('home');
  const [photos,  setPhotos]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [lb,      setLb]      = useState(null);
  const [toast,   setToast]   = useState(null);
  const [ready,   setReady]   = useState(false);
  const [showSS,  setShowSS]  = useState(false);

  useEffect(()=>{ setTimeout(()=>setReady(true), 1900); },[]);

  useEffect(()=>{
    if(!ready) return;
    const fb=window.__fb;
    if(!fb||!guest){ setPhotos(DEMO); setLoading(false); return; }
    const{db,collection,onSnapshot,query,orderBy}=fb;
    try{
      const q=query(collection(db,'photos'),orderBy('createdAt','desc'));
      const u=onSnapshot(q,snap=>{
        const data=snap.docs.map(d=>({id:d.id,...d.data()}));
        setPhotos(data.length?data:DEMO); setLoading(false);
      },()=>{ setPhotos(DEMO); setLoading(false); });
      return u;
    }catch(e){ setPhotos(DEMO); setLoading(false); }
  },[ready,guest]);

  const saveName = n => { localStorage.setItem('wg',n); setGuest(n); };

  const upd = (id,data) => {
    setPhotos(prev=>prev.map(p=>p.id===id?{...p,...data}:p));
    if(lb?.id===id) setLb(prev=>({...prev,...data}));
  };

  const likePhoto = async photo => {
    const likes=photo.likes||[]; const on=likes.includes(guest);
    const nl=on?likes.filter(n=>n!==guest):[...likes,guest];
    upd(photo.id,{likes:nl});
    try{const fb=window.__fb;if(fb)await fb.updateDoc(fb.doc(fb.db,'photos',photo.id),{likes:nl});}catch(e){}
  };

  const addCom = async (photo,txt) => {
    const c={author:guest,text:txt.trim(),time:new Date().toISOString()};
    const nc=[...(photo.comments||[]),c];
    upd(photo.id,{comments:nc});
    try{const fb=window.__fb;if(fb)await fb.updateDoc(fb.doc(fb.db,'photos',photo.id),{comments:nc});}catch(e){}
  };

  const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(null),2900); };
  const go = t => setTab(t);

  if(!ready) return <Loading/>;

  return (
    <>
      {!guest && <NameModal onDone={saveName}/>}

      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='home'    && <Home    photos={photos} onNav={go}/>}
        {tab==='gallery' && <Gallery photos={photos} loading={loading} guest={guest} onPick={p=>setLb(p)} onLike={likePhoto} onSlideshow={()=>setShowSS(true)}/>}
        {tab==='feed'    && <Feed    photos={[...photos].reverse()} guest={guest} onUpdate={upd} onUpload={()=>go('upload')}/>}
        {tab==='upload'  && <Upload  guest={guest} onToast={toast_} onDone={()=>{toast_('Foto publicada! 🌸');go('gallery');}}/>}
      </div>

      {/* bottom nav */}
  <div className="bnav">
    <button className={`bnav-btn ${tab==='home'?'on':''}`} onClick={()=>go('home')}>
      <HomeIc width="21" height="21"/><span>Início</span>
    </button>
    <button className={`bnav-btn ${tab==='gallery'?'on':''}`} onClick={()=>go('gallery')}>
      <GridIc width="21" height="21"/><span>Galeria</span>
    </button>
    <button className="bnav-btn bnav-cam" onClick={()=>go('upload')}>
      <CamIc width="21" height="21" strokeWidth="1.6"/>
      <span style={{fontSize:'.58rem',letterSpacing:'.09em',textTransform:'uppercase',fontWeight:600}}>Publicar</span>
    </button>
    <button className={`bnav-btn ${tab==='feed'?'on':''}`} onClick={()=>go('feed')}>
      <PlayIc width="21" height="21"/><span>Feed</span>
    </button>
    <button className={`bnav-btn bnav-ss`} onClick={()=>setShowSS(true)} title="Apresentação de slides">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="21" height="21" strokeWidth="1.8">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span>Slides</span>
    </button>
  </div>

      {lb && <Lightbox photo={lb} guest={guest} onClose={()=>setLb(null)} onLike={likePhoto} onComment={addCom}/>}
  {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
  {showSS && <Slideshow photos={photos} onClose={()=>setShowSS(false)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
