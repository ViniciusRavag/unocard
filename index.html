<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nossa História · Galeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

  // ══════════════════════════════════════════
  //  🔥 CONFIGURE SEU FIREBASE AQUI
  // ══════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJECT.firebaseapp.com",
    projectId: "SEU_PROJECT_ID",
    storageBucket: "SEU_PROJECT.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };
  // ══════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  window.__firebase = { db, storage, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, onSnapshot, query, orderBy, serverTimestamp, ref, uploadBytes, getDownloadURL };
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #ffffff;
    --bg-sec: #fafafa;
    --text-dark: #121212;
    --text-muted: #737373;
    --border: #dbdbdb;
    --accent: #e1306c; /* Tom rosado/vermelho social */
    --accent-light: #fce4ec;
    --nav-h: 60px;
    --header-h: 54px;
    --font-ui: 'Inter', sans-serif;
    --font-serif: 'Playfair Display', serif;
    --radius: 12px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg-main); }
  body { font-family: var(--font-ui); color: var(--text-dark); -webkit-tap-highlight-color: transparent; }

  #root { height: 100vh; display: flex; flex-direction: column; background: var(--bg-main); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

  /* ── SPLASH ── */
  .splash {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg-main);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: splashOut 0.5s ease 2.8s forwards;
  }
  .splash-icon { font-size: 3.5rem; animation: pulse 1.5s infinite; margin-bottom: 16px; }
  .splash h1 {
    font-family: var(--font-serif); font-size: 2.2rem; font-weight: 600; color: var(--text-dark);
    opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
  }
  .splash p {
    font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 8px;
    opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards;
  }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
  @keyframes splashOut { to { opacity:0; pointer-events:none; } }

  /* ── HEADER ── */
  .header {
    height: var(--header-h); flex-shrink: 0;
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; position: relative; z-index: 100;
  }
  .header-title { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 600; color: var(--text-dark); }
  .header-user {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 600; color: white; border: 2px solid white; box-shadow: 0 0 0 1px var(--border);
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    height: var(--nav-h); flex-shrink: 0;
    background: var(--bg-main); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    height: 100%; border: none; background: transparent; cursor: pointer;
    color: var(--text-dark); transition: transform 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn svg { width: 26px; height: 26px; stroke-width: 1.8; transition: stroke-width 0.2s; }
  .nav-btn.active svg { stroke-width: 2.5; }
  .nav-upload-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--text-dark); color: white;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn.active .nav-upload-wrap { background: var(--accent); }

  /* ── CONTENT ── */
  .content { flex: 1; overflow: hidden; position: relative; background: var(--bg-sec); }

  /* ── NAME MODAL ── */
  .name-modal-overlay {
    position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .name-modal {
    background: var(--bg-main); border-radius: 20px; padding: 32px 24px;
    width: 100%; max-width: 400px; text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    animation: scaleUp 0.4s cubic-bezier(.17,.67,.38,1.1);
  }
  .name-modal h2 { font-family: var(--font-serif); font-size: 1.8rem; margin: 16px 0 8px; }
  .name-modal p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px; }
  .input-field {
    width: 100%; padding: 14px 16px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg-sec); font-family: var(--font-ui);
    font-size: 1rem; color: var(--text-dark); outline: none; transition: 0.2s; margin-bottom: 16px;
  }
  .input-field:focus { border-color: var(--text-dark); background: var(--bg-main); }
  .btn-primary {
    width: 100%; padding: 14px; background: var(--text-dark); color: white;
    border: none; border-radius: 8px; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: 0.2s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; }
  @keyframes scaleUp { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }

  /* ── GALLERY VIEW (IG Style Grid) ── */
  .gallery-view { height: 100%; overflow-y: auto; background: var(--bg-main); }
  .gallery-profile-header {
    display: flex; align-items: center; gap: 20px; padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .profile-avatar {
    width: 76px; height: 76px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
  }
  .profile-stats { flex: 1; display: flex; gap: 24px; }
  .stat-item { display: flex; flex-direction: column; align-items: center; }
  .stat-num { font-weight: 600; font-size: 1.1rem; }
  .stat-label { font-size: 0.8rem; color: var(--text-muted); }
  .profile-bio { padding: 0 16px 16px; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
  
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .grid-item { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: var(--bg-sec); }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
  .grid-item:active img { opacity: 0.8; }
  .grid-icon { position: absolute; top: 8px; right: 8px; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }

  /* ── FEED VIEW (Reels/TikTok Style) ── */
  .feed-view { height: 100%; background: #000; overflow-y: scroll; scroll-snap-type: y mandatory; }
  .feed-view::-webkit-scrollbar { display: none; }
  .feed-item { height: 100%; scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center; }
  .feed-img { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .feed-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%); pointer-events: none;
  }
  .feed-actions { position: absolute; right: 12px; bottom: 80px; display: flex; flex-direction: column; gap: 24px; z-index: 10; }
  .action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); transition: 0.2s; }
  .action-btn:active { transform: scale(0.8); }
  .action-btn svg { width: 32px; height: 32px; stroke-width: 1.8; }
  .action-btn.liked svg { fill: var(--accent); stroke: var(--accent); }
  .action-lbl { font-size: 0.8rem; font-weight: 600; }
  .feed-info { position: absolute; left: 16px; bottom: 30px; right: 80px; color: white; z-index: 10; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
  .feed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .feed-author-name { font-weight: 600; font-size: 1rem; }
  .feed-caption { font-size: 0.9rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* ── UPLOAD VIEW ── */
  .upload-view { height: 100%; background: var(--bg-main); display: flex; flex-direction: column; }
  .upload-topbar { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .upload-topbar h3 { font-size: 1.1rem; font-weight: 600; }
  .share-btn { color: #0095f6; font-weight: 600; border: none; background: none; font-size: 1rem; cursor: pointer; }
  .share-btn:disabled { color: #b2dffc; }
  .upload-content { padding: 16px; flex: 1; overflow-y: auto; }
  .upload-zone {
    width: 100%; aspect-ratio: 1; background: var(--bg-sec); border: 1px dashed var(--border);
    border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-muted); cursor: pointer; position: relative; overflow: hidden; margin-bottom: 16px;
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .caption-area { width: 100%; border: none; outline: none; font-size: 1rem; font-family: var(--font-ui); resize: none; height: 80px; margin-top: 16px; }
  
  /* ── LIGHTBOX (IG Post Style) ── */
  .lightbox-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
  .lightbox-card { width: 100%; max-width: 450px; background: var(--bg-main); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
  .lb-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .lb-user { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9rem; }
  .lb-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; }
  .lb-img { width: 100%; max-height: 50vh; object-fit: contain; background: #000; }
  .lb-actions { padding: 12px 16px 8px; display: flex; gap: 16px; }
  .lb-action { background: none; border: none; cursor: pointer; color: var(--text-dark); transition: transform 0.1s; }
  .lb-action:active { transform: scale(0.8); }
  .lb-action.liked svg { fill: var(--accent); stroke: var(--accent); }
  .lb-likes { padding: 0 16px; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
  .lb-caption { padding: 0 16px 12px; font-size: 0.9rem; line-height: 1.4; }
  .lb-caption span { font-weight: 600; margin-right: 6px; }
  .lb-time { padding: 0 16px 16px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

  /* ── COMMENTS SHEET ── */
  .sheet-overlay { position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; animation: fadeIn 0.2s; }
  .sheet-content { width: 100%; height: 65vh; background: var(--bg-main); border-radius: 20px 20px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
  .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 4px; margin: 12px auto; }
  .sheet-title { text-align: center; font-weight: 600; font-size: 1rem; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sheet-list { flex: 1; overflow-y: auto; padding: 16px; }
  .comment-item { display: flex; gap: 12px; margin-bottom: 16px; }
  .comment-text-block { flex: 1; font-size: 0.9rem; }
  .comment-text-block strong { font-weight: 600; margin-right: 6px; }
  .comment-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .sheet-input-area { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
  .sheet-input-area input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; outline: none; font-family: var(--font-ui); }
  .sheet-send { color: #0095f6; font-weight: 600; background: none; border: none; font-size: 0.95rem; }

  /* ── UTILS ── */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 900; animation: toastAnim 2.5s forwards; font-weight: 500; }
  .dt-heart { position: absolute; font-size: 6rem; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; animation: dtBurst 0.8s ease; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); z-index: 20; }
  .loader { display: flex; justify-content: center; padding: 40px; }
  .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--text-dark); border-radius: 50%; animation: spin 1s linear infinite; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes toastAnim { 0% { opacity:0; top: 0; } 10% { opacity:1; top: 20px; } 80% { opacity:1; top: 20px; } 100% { opacity:0; top: 0; } }
  @keyframes dtBurst { 0% { opacity:0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity:1; transform: translate(-50%, -50%) scale(1.2); } 50% { opacity:1; transform: translate(-50%, -50%) scale(1); } 100% { opacity:0; transform: translate(-50%, -50%) scale(1); } }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── HELPERS ──────────────────────────────
const initials = name => name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '';
const relTime = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d`;
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
};

// ── ICONS (Heroicons / Lucide style) ─────
const Icon = ({ name, ...p }) => {
  const s = { width: 24, height: 24, fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round", ...p };
  const paths = {
    grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></>,
    film: <><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    heartSolid: <path fill="currentColor" stroke="none" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    comment: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
    download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>
  };
  return <svg viewBox="0 0 24 24" {...s}>{paths[name]}</svg>;
};

// ── TOAST ────────────────────────────────
const Toast = ({ msg, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
};

// ── NAME MODAL ───────────────────────────
const NameModal = ({ onDone }) => {
  const [name, setName] = useState('');
  const submit = () => { if (name.trim()) onDone(name.trim()); };
  return (
    <div className="name-modal-overlay">
      <div className="name-modal">
        <div style={{fontSize:'3rem', marginBottom:'10px'}}>🥂</div>
        <h2>Celebre Conosco</h2>
        <p>Insira seu nome para curtir e comentar nas fotos do casamento.</p>
        <input className="input-field" placeholder="Seu nome completo" value={name}
          onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} autoFocus />
        <button className="btn-primary" onClick={submit} disabled={!name.trim()}>Entrar</button>
      </div>
    </div>
  );
};

// ── GALLERY VIEW (Grid) ──────────────────
const GalleryView = ({ photos, loading, onPhotoClick }) => {
  return (
    <div className="gallery-view">
      <div className="gallery-profile-header">
        <div className="profile-avatar">🤍</div>
        <div className="profile-stats">
          <div className="stat-item">
            <span className="stat-num">{photos.length}</span>
            <span className="stat-label">publicações</span>
          </div>
          <div className="stat-item">
            <span className="stat-num">∞</span>
            <span className="stat-label">amor</span>
          </div>
        </div>
      </div>
      <div className="profile-bio">
        <b>Nossa História</b><br/>
        Compartilhando momentos eternos deste dia especial. ✨📸
      </div>
      
      {loading ? <div className="loader"><div className="spinner"/></div> : (
        <div className="photo-grid">
          {photos.map((p, i) => (
            <div key={p.id} className="grid-item" onClick={() => onPhotoClick(p, i)}>
              <img src={p.url} loading="lazy" />
              {(p.comments?.length > 0 || p.likes?.length > 0) && (
                 <div className="grid-icon">
                    {/* Small visual indicator that it has interaction, optional */}
                 </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── FEED VIEW (Reels Style) ──────────────
const FeedView = ({ photos, guestName, onUpdate }) => {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [showComments, setShowComments] = useState(null);
  const [dtHeart, setDtHeart] = useState(false);
  const [lastTap, setLastTap] = useState(0);
  const scrollRef = useRef();

  const handleScroll = useCallback(() => {
    if (!scrollRef.current) return;
    const { scrollTop, clientHeight } = scrollRef.current;
    setCurrentIdx(Math.round(scrollTop / clientHeight));
  }, []);

  const toggleLike = async (photo) => {
    const fb = window.__firebase; if (!fb) return;
    const likes = photo.likes || [];
    const liked = likes.includes(guestName);
    const newLikes = liked ? likes.filter(n => n !== guestName) : [...likes, guestName];
    onUpdate(photo.id, { likes: newLikes });
    try { await fb.updateDoc(fb.doc(fb.db, 'photos', photo.id), { likes: newLikes }); } catch(e) {}
  };

  const handleDoubleTap = (photo) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      if (!(photo.likes||[]).includes(guestName)) toggleLike(photo);
      setDtHeart(true); setTimeout(() => setDtHeart(false), 800);
    }
    setLastTap(now);
  };

  if (photos.length === 0) return <div className="feed-view" style={{display:'flex', alignItems:'center', justifyContent:'center', color:'#fff'}}>Nenhuma foto ainda.</div>;

  return (
    <div className="feed-view" ref={scrollRef} onScroll={handleScroll}>
      {photos.map((photo, i) => {
        const liked = (photo.likes||[]).includes(guestName);
        return (
          <div key={photo.id} className="feed-item" onClick={() => handleDoubleTap(photo)}>
            <div className="feed-img" style={{backgroundImage:`url(${photo.url})`}}/>
            <div className="feed-overlay"/>
            {i === currentIdx && dtHeart && <div className="dt-heart">❤️</div>}
            
            <div className="feed-actions" onClick={e => e.stopPropagation()}>
              <button className={`action-btn ${liked ? 'liked' : ''}`} onClick={() => toggleLike(photo)}>
                {liked ? <Icon name="heartSolid" /> : <Icon name="heart" />}
                <span className="action-lbl">{(photo.likes||[]).length}</span>
              </button>
              <button className="action-btn" onClick={() => setShowComments(photo)}>
                <Icon name="comment" />
                <span className="action-lbl">{(photo.comments||[]).length}</span>
              </button>
              <button className="action-btn" onClick={() => { const a=document.createElement('a');a.href=photo.url;a.download='casamento.jpg';a.click(); }}>
                <Icon name="download" />
              </button>
            </div>

            <div className="feed-info">
              <div className="feed-author">
                <div className="lb-avatar" style={{width:36, height:36, color:'#000', background:'#fff'}}>{initials(photo.author)}</div>
                <span className="feed-author-name">{photo.author}</span>
              </div>
              {photo.caption && <p className="feed-caption">{photo.caption}</p>}
            </div>
          </div>
        );
      })}
      {showComments && <CommentsSheet photo={showComments} guestName={guestName} onClose={() => setShowComments(null)} onUpdate={onUpdate}/>}
    </div>
  );
};

// ── COMMENTS SHEET ───────────────────────
const CommentsSheet = ({ photo, guestName, onClose, onUpdate }) => {
  const [text, setText] = useState('');
  const listRef = useRef();

  const send = async () => {
    if (!text.trim()) return;
    const fb = window.__firebase; if (!fb) return;
    const comment = { author: guestName, text: text.trim(), time: new Date().toISOString() };
    const newComments = [...(photo.comments||[]), comment];
    onUpdate(photo.id, { comments: newComments });
    setText('');
    setTimeout(() => { if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight; }, 100);
    try { await fb.updateDoc(fb.doc(fb.db, 'photos', photo.id), { comments: newComments }); } catch(e) {}
  };

  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet-content" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-title">Comentários</div>
        <div className="sheet-list" ref={listRef}>
          {(photo.comments||[]).length === 0 ? (
             <div style={{textAlign:'center', color:'var(--text-muted)', marginTop:'40px'}}>Seja o primeiro a comentar.</div>
          ) : (
            (photo.comments||[]).map((c, i) => (
              <div key={i} className="comment-item">
                <div className="lb-avatar">{initials(c.author)}</div>
                <div className="comment-text-block">
                  <div><strong>{c.author}</strong> {c.text}</div>
                  <div className="comment-time">{relTime(c.time)}</div>
                </div>
              </div>
            ))
          )}
        </div>
        <div className="sheet-input-area">
          <div className="lb-avatar">{initials(guestName)}</div>
          <input placeholder="Adicione um comentário..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} />
          <button className="sheet-send" onClick={send} disabled={!text.trim()}>Publicar</button>
        </div>
      </div>
    </div>
  );
};

// ── LIGHTBOX (IG Post Detail) ────────────
const Lightbox = ({ photo, guestName, onClose, onUpdate }) => {
  const [showComments, setShowComments] = useState(false);
  const liked = (photo.likes||[]).includes(guestName);

  const toggleLike = async () => {
    const fb = window.__firebase; if (!fb) return;
    const likes = photo.likes || [];
    const newLikes = liked ? likes.filter(n => n !== guestName) : [...likes, guestName];
    onUpdate(photo.id, { likes: newLikes });
    try { await fb.updateDoc(fb.doc(fb.db, 'photos', photo.id), { likes: newLikes }); } catch(e) {}
  };

  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <div className="lightbox-card" onClick={e => e.stopPropagation()}>
        <div className="lb-header">
          <div className="lb-user">
            <div className="lb-avatar">{initials(photo.author)}</div>
            {photo.author}
          </div>
          <button style={{background:'none', border:'none', cursor:'pointer'}} onClick={onClose}><Icon name="x" width="20" height="20"/></button>
        </div>
        <img src={photo.url} className="lb-img" />
        <div className="lb-actions">
          <button className={`lb-action ${liked ? 'liked' : ''}`} onClick={toggleLike}>
             {liked ? <Icon name="heartSolid" width="26" height="26"/> : <Icon name="heart" width="26" height="26"/>}
          </button>
          <button className="lb-action" onClick={() => setShowComments(true)}><Icon name="comment" width="26" height="26"/></button>
          <button className="lb-action" onClick={() => { const a=document.createElement('a');a.href=photo.url;a.download='foto.jpg';a.click(); }}><Icon name="download" width="26" height="26"/></button>
        </div>
        <div className="lb-likes">{(photo.likes||[]).length} curtidas</div>
        {photo.caption && <div className="lb-caption"><span>{photo.author}</span>{photo.caption}</div>}
        <div className="lb-time">{relTime(photo.createdAt)}</div>
      </div>
      {showComments && <CommentsSheet photo={photo} guestName={guestName} onClose={() => setShowComments(false)} onUpdate={onUpdate}/>}
    </div>
  );
};

// ── UPLOAD VIEW (New Post Style) ─────────
const UploadView = ({ guestName, onUploaded, onToast }) => {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [caption, setCaption] = useState('');
  const [uploading, setUploading] = useState(false);

  const handleFile = (f) => {
    if (!f || !f.type.startsWith('image/')) return;
    setFile(f); setPreview(URL.createObjectURL(f));
  };

  const upload = async () => {
    if (!file) return;
    const fb = window.__firebase; if (!fb) { onToast('Configure o Firebase!'); return; }
    setUploading(true);
    try {
      const storageRef = fb.ref(fb.storage, `photos/${Date.now()}_${file.name}`);
      await fb.uploadBytes(storageRef, file);
      const url = await fb.getDownloadURL(storageRef);
      await fb.addDoc(fb.collection(fb.db, 'photos'), {
        url, author: guestName, caption, likes: [], comments: [], createdAt: fb.serverTimestamp()
      });
      onToast('Publicado com sucesso!');
      setFile(null); setPreview(null); setCaption('');
      onUploaded();
    } catch(e) {
      onToast('Erro ao enviar.');
    } finally { setUploading(false); }
  };

  return (
    <div className="upload-view">
      <div className="upload-topbar">
        <h3>Nova Publicação</h3>
        <button className="share-btn" onClick={upload} disabled={!file || uploading}>
          {uploading ? 'Compartilhando...' : 'Compartilhar'}
        </button>
      </div>
      <div className="upload-content">
        <label className="upload-zone">
          <input type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files[0])} />
          {preview ? <img src={preview} className="preview-img" /> : (
            <><Icon name="image" width="48" height="48" style={{marginBottom:'12px', strokeWidth:1.2}}/>
            <span>Tocar para selecionar ou fotografar</span></>
          )}
        </label>
        <div style={{display:'flex', gap:'12px'}}>
          <div className="lb-avatar" style={{width:36, height:36, flexShrink:0}}>{initials(guestName)}</div>
          <textarea className="caption-area" placeholder="Escreva uma legenda..." value={caption} onChange={e => setCaption(e.target.value)} maxLength={200}/>
        </div>
      </div>
    </div>
  );
};

// ── MAIN APP ─────────────────────────────
const App = () => {
  const [guestName, setGuestName] = useState(() => localStorage.getItem('weddingGuest') || '');
  const [tab, setTab] = useState('gallery');
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lightbox, setLightbox] = useState(null);
  const [toast, setToast] = useState(null);
  const [splashDone, setSplashDone] = useState(false);

  useEffect(() => { setTimeout(() => setSplashDone(true), 3200); }, []);

  useEffect(() => {
    if (!guestName) return;
    const fb = window.__firebase; if (!fb) { setLoading(false); return; }
    const q = fb.query(fb.collection(fb.db, 'photos'), fb.orderBy('createdAt', 'desc'));
    return fb.onSnapshot(q, snap => {
      setPhotos(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false);
    }, () => setLoading(false));
  }, [guestName]);

  const updatePhoto = (id, data) => {
    setPhotos(prev => prev.map(p => p.id === id ? {...p, ...data} : p));
    if (lightbox?.id === id) setLightbox(prev => ({...prev, ...data}));
  };

  return (
    <>
      {/* SPLASH */}
      {!splashDone && (
        <div className="splash">
          <div className="splash-icon">💍</div>
          <h1>Nossa História</h1>
          <p>Galeria de Fotos</p>
        </div>
      )}

      {/* APP */}
      {splashDone && (
        <>
          {!guestName && <NameModal onDone={n => { localStorage.setItem('weddingGuest', n); setGuestName(n); }}/>}
          
          <div className="header">
            <div className="header-title">Nossa História</div>
            {guestName && <div className="header-user">{initials(guestName)}</div>}
          </div>

          <div className="content">
            {tab === 'gallery' && <GalleryView photos={photos} loading={loading} onPhotoClick={p => setLightbox(p)} />}
            {tab === 'feed' && <FeedView photos={[...photos].reverse()} guestName={guestName} onUpdate={updatePhoto} />}
            {tab === 'upload' && <UploadView guestName={guestName} onToast={m => { setToast(m); setTimeout(() => setToast(null), 2500); }} onUploaded={() => setTab('gallery')}/>}
          </div>

          <div className="bottom-nav">
            <button className={`nav-btn ${tab==='gallery'?'active':''}`} onClick={() => setTab('gallery')}><Icon name="grid"/></button>
            <button className={`nav-btn ${tab==='upload'?'active':''}`} onClick={() => setTab('upload')}>
              <div className="nav-upload-wrap"><Icon name="plus"/></div>
            </button>
            <button className={`nav-btn ${tab==='feed'?'active':''}`} onClick={() => setTab('feed')}><Icon name="film"/></button>
          </div>

          {lightbox && <Lightbox photo={lightbox} guestName={guestName} onClose={() => setLightbox(null)} onUpdate={updatePhoto}/>}
          {toast && <Toast msg={toast} onDone={() => setToast(null)}/>}
        </>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
